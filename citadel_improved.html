<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Wasteland Citadel Defense</title>
    <style>
        body { margin: 0; background: #222; color: #fff; font-family: sans-serif; overflow: hidden; }
        .header { display: flex; justify-content: space-between; align-items: center; padding: 10px 20px; background: #111; border-bottom: 1px solid #444; flex-wrap: wrap; gap: 8px; }
        .stats span { margin-right: 12px; font-weight: bold; color: #ccc; white-space: nowrap; }
        .stats span b { color: #fff; }
        .controls button { padding: 8px 12px; margin-left: 4px; cursor: pointer; background: #444; color: #fff; border: 1px solid #666; border-radius: 4px; }
        .controls button:hover { background: #555; }
        .speed-btn { font-weight: bold; }
        
        .epic-controls { display: flex; justify-content: center; gap: 12px; padding: 10px; background: #1a1a1a; border-bottom: 2px solid #444; flex-wrap: wrap; }
        .epic-controls button { padding: 8px 14px; font-weight: bold; cursor: pointer; border: none; border-radius: 4px; color: white; }
        .epic-controls button:disabled { background: #333 !important; color: #777 !important; cursor: not-allowed; }

        #game-container { position: relative; width: 800px; margin: 20px auto 0 auto; }
        canvas { background: #343434; display: block; border: 4px solid #555; cursor: crosshair; border-bottom: none; }
        
        .bottom-panel { display: flex; justify-content: center; align-items: center; padding: 15px; background: #111; width: 800px; margin: 0 auto; border: 4px solid #555; border-top: 1px solid #444; box-sizing: border-box; gap: 20px; }
        .bottom-panel button { padding: 10px 30px; font-size: 16px; font-weight: bold; cursor: pointer; background: #444; color: #fff; border: 1px solid #666; border-radius: 4px; }
        .bottom-panel button:hover { background: #555; }
        #dps-info { color: #aaa; font-size: 14px; }

        #do-autoloot-btn {
            display: none; position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, 30px);
            background: #ff9800; color: #fff; font-weight: bold; font-size: 11px;
            border: 2px solid #e65100; border-radius: 4px; padding: 4px 6px; cursor: pointer;
            box-shadow: 0px 0px 10px rgba(255, 152, 0, 0.5); z-index: 10;
        }
        #do-autoloot-btn:hover { background: #e65100; }
        
        #upgrade-menu {
            display: none; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.92); border: 2px solid #777; padding: 20px; border-radius: 8px; text-align: center; z-index: 20; min-width: 260px;
        }
        #upgrade-menu h3 { margin-top: 0; color: #ffd700; }
        .upg-btn { display: block; width: 100%; margin: 10px 0; padding: 10px; background: #444; color: #fff; border: 1px solid #777; cursor: pointer; }
        .upg-btn:hover { background: #555; }
        .upg-btn:disabled { background: #222; color: #555; border-color: #333; cursor: not-allowed; }
        
        #game-over {
            display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(150, 0, 0, 0.55); color: white; text-align: center; align-content: center; font-size: 30px; font-weight: bold; z-index: 30;
        }
    </style>
</head>
<body>

    <div class="header">
        <div class="stats">
            <span>Волна: <b id="wave-num">1</b></span>
            <span>Статус: <b id="status">Ожидание</b></span>
            <span>Монеты: <b id="gold" style="color:#ffd700;">0</b></span>
            <span>Слизь: <b id="slime" style="color:#32cd32;">0</b></span>
            <span>Кости: <b id="bones" style="color:#e0eeee;">0</b></span>
            <span>Стена: <b id="wall-hp">1000/1000</b> <span id="shield-ui" style="color:cyan; display:none;">(+<b id="shield-hp">0</b>)</span></span>
        </div>
        <div class="controls">
            <span style="margin-right: 12px; border-right: 2px solid #555; padding-right: 12px;">
                <button onclick="setSpeed(1)" id="btn-s1" class="speed-btn" style="background: #28a745;">x1</button>
                <button onclick="setSpeed(2)" id="btn-s2" class="speed-btn">x2</button>
                <button onclick="setSpeed(5)" id="btn-s5" class="speed-btn">x5</button>
                <button onclick="setSpeed(10)" id="btn-s10" class="speed-btn">x10</button>
            </span>
            <button onclick="repairWall()" id="repair-btn" title="1 кость = 100 HP">Чинить стену (1 кость = 100 HP)</button>
            <button onclick="saveGame()">Сохранить</button>
            <button onclick="loadGame()">Загрузить</button>
        </div>
    </div>

    <div class="epic-controls">
        <button id="heli-status-btn" disabled style="background:#555;">🚁 Ждем 3-ю волну...</button>
        
        <button id="heli-specops-btn" onclick="buySpecOps()" style="display:none; background:#28a745;">🚁 Рация Спецназа</button>
        <button id="heli-autoloot-btn" onclick="buyAutoLoot()" style="display:none; background:#ff9800;">🚁 Девайс Сбора (400 Слизи)</button>
        <button id="heli-shield-btn" onclick="buyShield()" style="display:none; background:#00bcd4;">🚁 Броня +1200 (800 Слизи)</button>

        <button id="spec-ops-btn" onclick="useSpecOps()" disabled style="background:#dc3545;">🔫 Вызвать Спецназ (0)</button>
        <button id="upg-citadel-btn" onclick="upgradeCitadel()" style="background:#6c757d;">Укрепить Цитадель: 2000 ХП (700 костей)</button>
    </div>

    <div id="game-container">
        <canvas id="gameCanvas" width="800" height="600"></canvas>
        <button id="do-autoloot-btn" onclick="doAutoLoot()" title="Магнитный сбор">🧲 СБОР</button>
        
        <div id="upgrade-menu">
            <h3>Улучшение турели</h3>
            <div id="turret-stats" style="font-size:13px; color:#aaa; margin-bottom:10px;"></div>
            <button class="upg-btn" id="upg-range" onclick="buyUpgrade('range')">Дальность +25%</button>
            <button class="upg-btn" id="upg-speed" onclick="buyUpgrade('speed')">Скорость зарядки +25%</button>
            <button class="upg-btn" id="upg-damage" onclick="buyUpgrade('damage')">Урон +25%</button>
            <button class="upg-btn" onclick="closeUpgradeMenu()" style="background:#633;">Закрыть</button>
        </div>

        <div id="game-over">ЦИТАДЕЛЬ ПАЛА<br><span style="font-size: 20px; cursor: pointer; text-decoration: underline;" onclick="location.reload()">Начать заново</span></div>
    </div>
    
    <div class="bottom-panel">
        <button onclick="togglePause()" id="pause-btn">Пауза</button>
        <span id="dps-info">DPS турелей: ~24</span>
    </div>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

// ==================== БАЛАНС (крути здесь) ====================
const BALANCE = {
    baseZombies: 20,                  // как в оригинале — больше лута
    zombieCountScale: 1.10,           // +10% каждый уровень
    zombieHpBase: 38,
    zombieHpScale: 1.048,
    zombieSpeedBaseMin: 14,
    zombieSpeedBaseMax: 23,
    zombieSpeedScale: 1.04,
    zombieDmgBase: 1,
    zombieDmgEveryWaves: 8,

    turretRange: 130,
    turretCooldown: 1800,
    turretDamage: 12,

    repairPerBone: 100,
    timeBetweenWaves: 8500,

    // Укрепление — первая ступень дешевле
    upgradeCosts: [500, 2800, 7500, 16000],
    upgradeMaxHPs: [2000, 7500, 22000, 70000],

    // Вертолёт
    autoLootFromWave: 12,
    shieldFromWave: 20,
    autoLootCost: 350,
    shieldCost: 700,
    shieldAmount: 1200,

    // Спецназ — цена растёт очень медленно
    specOpsBaseCost: 45,
    specOpsCostPerWave: 2.5,
    specOpsDuration: 5000,
};

// ==================== ИГРОВЫЕ ПЕРЕМЕННЫЕ ====================
let isPaused = false;
let lastTime = performance.now();
let frameCount = 0;
let gameState = "WAITING"; 
let gameSpeed = 1; 

let waveNumber = 1;
let zombiesToSpawn = BALANCE.baseZombies;
let spawnDelay = 2000; 

let timers = { waveWait: 2500, spawn: 0 };
let resources = { gold: 0, slime: 0, bones: 0 };

let citadelUpgradeLevel = 0;
let specialOpsCharges = 0;
let specialOpsActiveTimer = 0; 
let hasAutoLoot = false;
let citadelShield = 0;

const citadel = {
    x: canvas.width / 2, y: canvas.height / 2,
    size: 140, maxHp: 1000, hp: 1000, wallThickness: 15
};

const survivor = { x: citadel.x, y: citadel.y, speed: 140, size: 8, targetLoot: null };

function createTurrets() {
    const offset = citadel.size / 2 - 10;
    const makeTurret = (x, y, angle) => ({
        x, y, angle,
        range: BALANCE.turretRange,
        maxCooldown: BALANCE.turretCooldown,
        charge: 0,
        damage: BALANCE.turretDamage,
        cost: { range: 12, speed: 12, damage: 12 }   // свой объект на каждую турель
    });
    return [
        makeTurret(citadel.x - offset, citadel.y - offset, Math.PI + Math.PI/4),
        makeTurret(citadel.x + offset, citadel.y - offset, -Math.PI/4),
        makeTurret(citadel.x - offset, citadel.y + offset, Math.PI - Math.PI/4),
        makeTurret(citadel.x + offset, citadel.y + offset, Math.PI/4)
    ];
}

let turrets = createTurrets();
let zombies = [];
let bullets = [];
let loots = [];
let particles = [];
let selectedTurret = null;

// ==================== УТИЛИТЫ ====================
function isHeliAvailable() {
    return (waveNumber % 3 === 0 && gameState === "WAVE") || 
           (gameState === "WAITING" && (waveNumber - 1) % 3 === 0 && waveNumber > 1);
}

function getSpecOpsCost() {
    return BALANCE.specOpsBaseCost + Math.floor(waveNumber * BALANCE.specOpsCostPerWave);
}

function calcTotalDPS() {
    let dps = 0;
    turrets.forEach(t => {
        dps += t.damage * (1000 / t.maxCooldown);
    });
    return Math.round(dps * 10) / 10;
}

function setSpeed(speed) {
    gameSpeed = speed;
    ["1","2","5","10"].forEach(s => {
        document.getElementById("btn-s" + s).style.background = (speed == s) ? "#28a745" : "#444";
    });
}

function spawnParticle(x, y, color, count = 6) {
    for (let i = 0; i < count; i++) {
        particles.push({
            x, y,
            vx: (Math.random() - 0.5) * 180,
            vy: (Math.random() - 0.5) * 180,
            life: 300 + Math.random() * 200,
            maxLife: 400,
            color,
            size: 2 + Math.random() * 3
        });
    }
}

// ==================== СОХРАНЕНИЕ ====================
function saveGame() {
    const data = { 
        version: 2,
        waveNumber, zombiesToSpawn, resources, 
        hp: citadel.hp, maxHp: citadel.maxHp,
        turrets, gameState, timers, citadelUpgradeLevel, 
        specialOpsCharges, hasAutoLoot, citadelShield
    };
    localStorage.setItem("citadelSave_v2", JSON.stringify(data));
    alert("Игра сохранена (v2)!");
}

function loadGame() {
    const save = localStorage.getItem("citadelSave_v2") || localStorage.getItem("citadelSave");
    if (save) {
        const data = JSON.parse(save);
        waveNumber = data.waveNumber || 1;
        zombiesToSpawn = data.zombiesToSpawn || BALANCE.baseZombies;
        resources = data.resources || { gold: 0, slime: 0, bones: 0 };
        citadel.hp = data.hp || 1000;
        citadel.maxHp = data.maxHp || 1000;
        if (data.turrets && data.turrets.length === 4) turrets = data.turrets;
        gameState = data.gameState === "GAME_OVER" ? "WAITING" : (data.gameState || "WAITING");
        timers = data.timers || { waveWait: 2500, spawn: 0 };
        citadelUpgradeLevel = data.citadelUpgradeLevel || 0;
        specialOpsCharges = data.specialOpsCharges || 0;
        hasAutoLoot = data.hasAutoLoot || false;
        citadelShield = data.citadelShield || 0;
        
        zombies = []; bullets = []; loots = []; particles = [];
        survivor.x = citadel.x; survivor.y = citadel.y;
        
        document.getElementById("game-over").style.display = "none";
        updateUI();
        alert("Загружено!");
    } else {
        alert("Нет сохранений!");
    }
}

// ==================== ПОКУПКИ ====================
function buySpecOps() {
    const cost = getSpecOpsCost();
    if (isHeliAvailable() && resources.slime >= cost) {
        resources.slime -= cost;
        specialOpsCharges++;
        updateUI();
    }
}

function buyAutoLoot() {
    if (isHeliAvailable() && resources.slime >= BALANCE.autoLootCost && !hasAutoLoot) {
        resources.slime -= BALANCE.autoLootCost;
        hasAutoLoot = true;
        updateUI();
    }
}

function buyShield() {
    if (isHeliAvailable() && resources.slime >= BALANCE.shieldCost && citadelShield <= 0) {
        resources.slime -= BALANCE.shieldCost;
        citadelShield = BALANCE.shieldAmount;
        updateUI();
    }
}

function doAutoLoot() {
    if (!hasAutoLoot || loots.length === 0) return;
    loots.forEach(item => {
        if (!item.isMagnetized) {
            item.isMagnetized = true;
            item.magnetSpeed = 60;
        }
    });
}

function useSpecOps() {
    if (specialOpsCharges > 0 && specialOpsActiveTimer <= 0) {
        specialOpsCharges--;
        specialOpsActiveTimer = BALANCE.specOpsDuration;
        updateUI();
    }
}

function upgradeCitadel() {
    if (citadelUpgradeLevel >= BALANCE.upgradeCosts.length) return;
    let cost = BALANCE.upgradeCosts[citadelUpgradeLevel];
    if (resources.bones >= cost) {
        resources.bones -= cost;
        citadel.maxHp = BALANCE.upgradeMaxHPs[citadelUpgradeLevel];
        citadel.hp = citadel.maxHp; 
        citadelUpgradeLevel++;
        updateUI();
    }
}

function togglePause() {
    if (gameState === "GAME_OVER") return;
    isPaused = !isPaused;
    document.getElementById("pause-btn").innerText = isPaused ? "Продолжить" : "Пауза";
    lastTime = performance.now(); 
}

function repairWall() {
    if (resources.bones >= 1 && citadel.hp < citadel.maxHp && gameState !== "GAME_OVER") {
        resources.bones--;
        citadel.hp = Math.min(citadel.maxHp, citadel.hp + BALANCE.repairPerBone); 
        updateUI();
    }
}

// ==================== АПГРЕЙД ТУРЕЛЕЙ ====================
canvas.addEventListener('mousedown', (e) => {
    if (gameState === "GAME_OVER") return;
    const rect = canvas.getBoundingClientRect();
    const mx = e.clientX - rect.left;
    const my = e.clientY - rect.top;

    turrets.forEach(t => {
        if (Math.hypot(t.x - mx, t.y - my) < 22) {
            selectedTurret = t;
            showUpgradeMenu();
        }
    });
});

function showUpgradeMenu() {
    if (!isPaused) togglePause();
    document.getElementById("upgrade-menu").style.display = "block";
    updateUpgradeButtons();
}

function closeUpgradeMenu() {
    document.getElementById("upgrade-menu").style.display = "none";
    selectedTurret = null;
    if (isPaused) togglePause();
}

function updateUpgradeButtons() {
    if (!selectedTurret) return;
    const t = selectedTurret;
    document.getElementById("turret-stats").innerText = 
        `Дальн: ${Math.round(t.range)} | CD: ${Math.round(t.maxCooldown)}мс | Урон: ${Math.round(t.damage*10)/10} | DPS: ${Math.round(t.damage*1000/t.maxCooldown*10)/10}`;

    const btnR = document.getElementById("upg-range");
    const btnS = document.getElementById("upg-speed");
    const btnD = document.getElementById("upg-damage");

    btnR.innerText = `Дальность +25% (Цена: ${t.cost.range})`;
    btnR.disabled = resources.gold < t.cost.range;
    btnS.innerText = `Скорость зарядки +25% (Цена: ${t.cost.speed})`;
    btnS.disabled = resources.gold < t.cost.speed;
    btnD.innerText = `Урон +25% (Цена: ${t.cost.damage})`;
    btnD.disabled = resources.gold < t.cost.damage;
}

function buyUpgrade(type) {
    if (!selectedTurret) return;
    let cost = selectedTurret.cost[type];
    
    if (resources.gold >= cost) {
        resources.gold -= cost;
        if (type === 'range') selectedTurret.range *= 1.25;
        if (type === 'speed') selectedTurret.maxCooldown *= 0.78;   // чуть мягче 0.75
        if (type === 'damage') selectedTurret.damage *= 1.25;
        
        selectedTurret.cost[type] = Math.floor(cost * 1.45);
        updateUI();
        updateUpgradeButtons();
    }
}

// ==================== ЗОМБИ ====================
function getZombieType(wave) {
    // По мере волн появляются fast и tank
    const r = Math.random();
    if (wave < 5) return "normal";
    if (wave < 12) {
        if (r < 0.18) return "fast";
        return "normal";
    }
    if (wave < 22) {
        if (r < 0.22) return "fast";
        if (r < 0.38) return "tank";
        return "normal";
    }
    // поздние волны
    if (r < 0.28) return "fast";
    if (r < 0.52) return "tank";
    return "normal";
}

function spawnZombie() {
    let x, y;
    const edge = Math.floor(Math.random() * 4);
    if (edge === 0) { x = Math.random() * canvas.width; y = -25; }
    else if (edge === 1) { x = canvas.width + 25; y = Math.random() * canvas.height; }
    else if (edge === 2) { x = Math.random() * canvas.width; y = canvas.height + 25; }
    else { x = -25; y = Math.random() * canvas.height; }

    const type = getZombieType(waveNumber);
    let hpMult = 1, speedMult = 1, size = 10, dmgMult = 1, color = "#5d7a42";

    if (type === "fast") {
        hpMult = 0.55;
        speedMult = 1.55;
        size = 8;
        dmgMult = 0.8;
        color = "#8bc34a";
    } else if (type === "tank") {
        hpMult = 2.25;        // было 2.8 — меньше мяса
        speedMult = 0.65;
        size = 14;
        dmgMult = 1.45;       // было 1.8
        color = "#3e5c2e";
    }

    let zHp = Math.round(BALANCE.zombieHpBase * Math.pow(BALANCE.zombieHpScale, waveNumber - 1) * hpMult);
    let baseSpeed = BALANCE.zombieSpeedBaseMin + Math.random() * (BALANCE.zombieSpeedBaseMax - BALANCE.zombieSpeedBaseMin);
    let zSpeed = baseSpeed * Math.pow(BALANCE.zombieSpeedScale, waveNumber - 1) * speedMult;

    zombies.push({
        x, y, hp: zHp, maxHp: zHp, 
        speed: zSpeed, size, attackTimer: 0,
        type, color, dmgMult
    });
}

// ==================== UI ====================
function updateUI() {
    document.getElementById("wave-num").innerText = waveNumber;
    document.getElementById("gold").innerText = resources.gold;
    document.getElementById("slime").innerText = resources.slime;
    document.getElementById("bones").innerText = resources.bones;
    document.getElementById("wall-hp").innerText = `${Math.floor(citadel.hp)}/${citadel.maxHp}`;
    
    document.getElementById("repair-btn").disabled = resources.bones < 1 || citadel.hp >= citadel.maxHp;
    document.getElementById("dps-info").innerText = `DPS турелей: ~${calcTotalDPS()}`;

    const statusEl = document.getElementById("status");
    if (gameState === "WAITING") statusEl.innerText = `До волны: ${Math.max(0, Math.ceil(timers.waveWait / 1000))}с`;
    else if (gameState === "WAVE") statusEl.innerText = `Врагов: ${zombies.length + zombiesToSpawn}`;
    else if (gameState === "LOOTING") statusEl.innerText = `Сбор лута...`;

    document.getElementById("do-autoloot-btn").style.display = hasAutoLoot ? "block" : "none";
    
    if (citadelShield > 0) {
        document.getElementById("shield-ui").style.display = "inline";
        document.getElementById("shield-hp").innerText = Math.floor(citadelShield);
    } else {
        document.getElementById("shield-ui").style.display = "none";
    }

    let btnStatus = document.getElementById("heli-status-btn");
    let btnSpec = document.getElementById("heli-specops-btn");
    let btnLoot = document.getElementById("heli-autoloot-btn");
    let btnShield = document.getElementById("heli-shield-btn");

    if (isHeliAvailable()) {
        btnStatus.style.display = "none";
        
        btnSpec.style.display = "inline-block";
        const cost = getSpecOpsCost();
        btnSpec.innerText = `🚁 Рация Спецназа (${cost} слизи)`;
        btnSpec.disabled = resources.slime < cost;

        if (waveNumber >= BALANCE.autoLootFromWave && !hasAutoLoot) {
            btnLoot.style.display = "inline-block";
            btnLoot.disabled = resources.slime < BALANCE.autoLootCost;
        } else {
            btnLoot.style.display = "none";
        }

        if (waveNumber >= BALANCE.shieldFromWave && citadelShield <= 0) {
            btnShield.style.display = "inline-block";
            btnShield.disabled = resources.slime < BALANCE.shieldCost;
        } else {
            btnShield.style.display = "none";
        }
    } else {
        btnStatus.style.display = "inline-block";
        btnSpec.style.display = "none";
        btnLoot.style.display = "none";
        btnShield.style.display = "none";

        let nextWave = waveNumber;
        while (nextWave % 3 !== 0 || (nextWave === waveNumber && gameState === "WAITING" && waveNumber > 1)) {
            nextWave++;
        }
        btnStatus.innerText = `🚁 Вертолет прилетит на ${nextWave} волне`;
    }

    let specOpsBtn = document.getElementById("spec-ops-btn");
    specOpsBtn.innerText = `🔫 Вызвать Спецназ (${specialOpsCharges})`;
    specOpsBtn.disabled = specialOpsCharges <= 0 || specialOpsActiveTimer > 0;

    let upgCitBtn = document.getElementById("upg-citadel-btn");
    if (citadelUpgradeLevel >= BALANCE.upgradeCosts.length) {
        upgCitBtn.innerText = `Цитадель улучшена до максимума!`;
        upgCitBtn.disabled = true;
    } else {
        const nextHp = BALANCE.upgradeMaxHPs[citadelUpgradeLevel];
        const cost = BALANCE.upgradeCosts[citadelUpgradeLevel];
        const names = ["Укрепить", "Бетонная стена", "Железобетон", "Крепость"];
        upgCitBtn.innerText = `${names[citadelUpgradeLevel] || "Укрепить"}: ${nextHp} ХП (${cost} костей)`;
        upgCitBtn.disabled = resources.bones < cost;
    }
}

// ==================== ОСНОВНАЯ ЛОГИКА ====================
function dropLoot(x, y) {
    let rand = Math.random();
    let type = "gold";
    // Больше слизи в середине, кости позже
    if (waveNumber >= 20) {
        if (rand > 0.30 && rand <= 0.55) type = "slime";
        else if (rand > 0.55) type = "bones";
    } else if (waveNumber >= 8) {
        if (rand > 0.35 && rand <= 0.65) type = "slime";   // больше слизи
        else if (rand > 0.65) type = "bones";
    } else {
        if (rand > 0.40 && rand <= 0.72) type = "slime";
        else if (rand > 0.72) type = "bones";
    }
    loots.push({ x, y, type, isMagnetized: false, magnetSpeed: 0 });
}

function updateGame(dt) {
    if (citadel.hp <= 0) {
        gameState = "GAME_OVER";
        document.getElementById("game-over").style.display = "block";
        return;
    }

    // Спецназ — мгновенный клир
    if (specialOpsActiveTimer > 0) {
        specialOpsActiveTimer -= dt;
        if (zombies.length > 0) {
            zombies.forEach(z => {
                dropLoot(z.x, z.y);
                spawnParticle(z.x, z.y, "#ff4444", 8);
            });
            zombies = [];
        }
    }

    // Таймеры волн
    if (gameState === "WAITING") {
        timers.waveWait -= dt;
        if (timers.waveWait <= 0) {
            gameState = "WAVE";
            zombiesToSpawn = Math.floor(BALANCE.baseZombies * Math.pow(BALANCE.zombieCountScale, waveNumber - 1));
            spawnDelay = Math.min(1800, 160000 / Math.max(1, zombiesToSpawn));
            timers.spawn = 0;
            updateUI(); 
        }
    }

    if (gameState === "WAVE") {
        if (zombiesToSpawn > 0) {
            timers.spawn -= dt;
            if (timers.spawn <= 0) {
                spawnZombie();
                zombiesToSpawn--;
                timers.spawn = spawnDelay;
            }
        } else if (zombies.length === 0) {
            gameState = loots.length > 0 ? "LOOTING" : "WAITING";
            if (gameState === "WAITING") {
                waveNumber++;
                timers.waveWait = BALANCE.timeBetweenWaves;
                updateUI();
            }
        }
    }

    // Движение и атака зомби
    const wallRadius = citadel.size / 2 + citadel.wallThickness / 2 + (citadelUpgradeLevel * 1.5);
    const baseDmg = BALANCE.zombieDmgBase + Math.floor((waveNumber - 1) / BALANCE.zombieDmgEveryWaves);

    for (let i = zombies.length - 1; i >= 0; i--) {
        let z = zombies[i];
        let dx = citadel.x - z.x;
        let dy = citadel.y - z.y;
        let dist = Math.hypot(dx, dy);

        if (dist > wallRadius + z.size) {
            z.x += (dx / dist) * z.speed * (dt / 1000);
            z.y += (dy / dist) * z.speed * (dt / 1000); 
        } else {
            z.attackTimer += dt;
            if (z.attackTimer >= 900) {   // чуть быстрее тик
                const dmg = Math.max(1, Math.round(baseDmg * z.dmgMult));
                if (citadelShield > 0) {
                    citadelShield = Math.max(0, citadelShield - dmg);
                } else {
                    citadel.hp -= dmg;
                }
                z.attackTimer = 0;
                spawnParticle(z.x + (Math.random()-0.5)*10, z.y + (Math.random()-0.5)*10, "#ff6666", 3);
            }
        }
    }

    // Турели
    turrets.forEach(t => {
        let target = null;
        let minDist = t.range;
        if (gameState === "WAVE" && zombies.length > 0) {
            // Приоритет танкам и ближайшим
            zombies.forEach(z => {
                let d = Math.hypot(z.x - t.x, z.y - t.y);
                if (d <= minDist) {
                    // небольшой приоритет танкам
                    let priority = d - (z.type === "tank" ? 25 : 0);
                    if (priority < minDist) {
                        minDist = priority;
                        target = z;
                    }
                }
            });
        }

        if (target) {
            t.angle = Math.atan2(target.y - t.y, target.x - t.x);
        }

        if (gameState === "WAVE") {
            if (t.charge < t.maxCooldown) {
                t.charge += dt;
            } else if (target) {
                let tx = target.x - t.x;
                let ty = target.y - t.y;
                let tDist = Math.hypot(tx, ty);
                const bulletSpeed = 420;
                bullets.push({
                    x: t.x + Math.cos(t.angle) * 14, 
                    y: t.y + Math.sin(t.angle) * 14, 
                    vx: (tx / tDist) * bulletSpeed, 
                    vy: (ty / tDist) * bulletSpeed, 
                    damage: t.damage
                });
                t.charge = 0; 
            }
        } else {
            t.charge = t.maxCooldown;
        }
    });

    // Пули
    for (let i = bullets.length - 1; i >= 0; i--) {
        let b = bullets[i];
        b.x += b.vx * (dt / 1000);
        b.y += b.vy * (dt / 1000);

        let hit = false;
        for (let j = zombies.length - 1; j >= 0; j--) {
            let z = zombies[j];
            if (Math.hypot(b.x - z.x, b.y - z.y) < z.size + 5) {
                z.hp -= b.damage;
                hit = true;
                spawnParticle(b.x, b.y, "#ffdd44", 4);
                if (z.hp <= 0) {
                    dropLoot(z.x, z.y);
                    spawnParticle(z.x, z.y, z.color, 10);
                    zombies.splice(j, 1);
                }
                break;
            }
        }
        
        if (hit || b.x < -20 || b.x > canvas.width + 20 || b.y < -20 || b.y > canvas.height + 20) {
            bullets.splice(i, 1);
        }
    }

    // Магнит
    for (let i = loots.length - 1; i >= 0; i--) {
        let item = loots[i];
        if (item.isMagnetized) {
            let dx = survivor.x - item.x;
            let dy = survivor.y - item.y;
            let dist = Math.hypot(dx, dy);
            
            item.magnetSpeed += 1400 * (dt / 1000); 
            let moveDist = item.magnetSpeed * (dt / 1000);
            
            if (dist <= moveDist + 6) {
                resources[item.type]++;
                loots.splice(i, 1);
            } else {
                item.x += (dx / dist) * moveDist;
                item.y += (dy / dist) * moveDist;
            }
        }
    }

    // Ручной сбор
    if (gameState === "LOOTING") {
        let activeLoots = loots.filter(l => !l.isMagnetized);
        
        if (activeLoots.length === 0) {
            let dx = citadel.x - survivor.x;
            let dy = citadel.y - survivor.y;
            let dist = Math.hypot(dx, dy);
            if (dist > 5) {
                survivor.x += (dx / dist) * survivor.speed * (dt / 1000);
                survivor.y += (dy / dist) * survivor.speed * (dt / 1000);
            } else {
                gameState = "WAITING";
                waveNumber++;
                timers.waveWait = BALANCE.timeBetweenWaves;
                updateUI();
            }
        } else {
            if (!survivor.targetLoot || !loots.includes(survivor.targetLoot) || survivor.targetLoot.isMagnetized) {
                let minDist = Infinity;
                survivor.targetLoot = null;
                activeLoots.forEach(item => {
                    let d = Math.hypot(item.x - survivor.x, item.y - survivor.y);
                    if (d < minDist) { minDist = d; survivor.targetLoot = item; }
                });
            }

            if (survivor.targetLoot) {
                let dx = survivor.targetLoot.x - survivor.x;
                let dy = survivor.targetLoot.y - survivor.y;
                let dist = Math.hypot(dx, dy);
                let moveDist = survivor.speed * (dt / 1000);

                if (dist > moveDist) {
                    survivor.x += (dx / dist) * moveDist;
                    survivor.y += (dy / dist) * moveDist;
                } else {
                    resources[survivor.targetLoot.type]++;
                    loots.splice(loots.indexOf(survivor.targetLoot), 1);
                    survivor.targetLoot = null;
                }
            }
        }
    } else {
        let dx = citadel.x - survivor.x;
        let dy = citadel.y - survivor.y;
        let dist = Math.hypot(dx, dy);
        if (dist > 2) {
            survivor.x += (dx / dist) * survivor.speed * (dt / 1000);
            survivor.y += (dy / dist) * survivor.speed * (dt / 1000);
        }
    }

    // Частицы
    for (let i = particles.length - 1; i >= 0; i--) {
        let p = particles[i];
        p.x += p.vx * (dt / 1000);
        p.y += p.vy * (dt / 1000);
        p.vx *= 0.96;
        p.vy *= 0.96;
        p.life -= dt;
        if (p.life <= 0) particles.splice(i, 1);
    }
}

// ==================== ОТРИСОВКА ====================
function drawGame() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // Радиусы турелей (полупрозрачные)
    turrets.forEach(t => {
        ctx.fillStyle = "rgba(255, 255, 255, 0.025)";
        ctx.beginPath(); ctx.arc(t.x, t.y, t.range, 0, Math.PI*2); ctx.fill();
    });

    // Цитадель
    let wallHealthRatio = Math.max(0, citadel.hp / citadel.maxHp);
    ctx.fillStyle = "#2a2a2a";
    ctx.fillRect(citadel.x - citadel.size/2, citadel.y - citadel.size/2, citadel.size, citadel.size);
    
    if (citadelUpgradeLevel === 0) ctx.strokeStyle = `rgb(${200 + wallHealthRatio * 55}, ${80 + wallHealthRatio * 100}, 40)`;
    else if (citadelUpgradeLevel === 1) ctx.strokeStyle = `#777`; 
    else if (citadelUpgradeLevel === 2) ctx.strokeStyle = `#5a6a7a`; 
    else ctx.strokeStyle = `#3a4a5a`; 
    
    ctx.lineWidth = citadel.wallThickness + (citadelUpgradeLevel * 2.5); 
    ctx.strokeRect(citadel.x - citadel.size/2, citadel.y - citadel.size/2, citadel.size, citadel.size);

    // Щит
    if (citadelShield > 0) {
        ctx.strokeStyle = "rgba(0, 220, 255, 0.55)";
        ctx.lineWidth = 5;
        let offset = citadel.wallThickness + (citadelUpgradeLevel * 2.5) + 6;
        ctx.strokeRect(citadel.x - citadel.size/2 - offset/2, citadel.y - citadel.size/2 - offset/2, citadel.size + offset, citadel.size + offset);
    }

    // Вертолёт
    if (isHeliAvailable()) {
        ctx.save();
        ctx.translate(citadel.x, citadel.y - citadel.size / 2 - 48); 
        
        ctx.strokeStyle = "#666";
        ctx.lineWidth = 3;
        ctx.beginPath(); ctx.moveTo(-16, 12); ctx.lineTo(16, 12); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(-11, 6); ctx.lineTo(-11, 12); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(11, 6); ctx.lineTo(11, 12); ctx.stroke();
        
        ctx.fillStyle = "#2e5c1e"; 
        ctx.beginPath(); ctx.arc(0, 0, 13, 0, Math.PI * 2); ctx.fill();
        ctx.fillRect(0, -4, 26, 7); 
        ctx.fillStyle = "#111";
        ctx.fillRect(24, -9, 3, 18); 
        
        ctx.fillStyle = "#add8e6";
        ctx.beginPath(); ctx.arc(-6, -2, 5, 0, Math.PI * 2); ctx.fill();
        
        ctx.strokeStyle = "#bbb";
        ctx.lineWidth = 2;
        let bladeAngle = (performance.now() / 35) % (Math.PI * 2);
        ctx.beginPath();
        ctx.moveTo(-Math.cos(bladeAngle) * 30, -15);
        ctx.lineTo(Math.cos(bladeAngle) * 30, -15);
        ctx.stroke();
        ctx.fillStyle = "#333";
        ctx.fillRect(-2, -15, 4, 15); 
        
        ctx.restore();
    }

    // Турели
    turrets.forEach(t => {
        ctx.save();
        ctx.translate(t.x, t.y);
        ctx.rotate(t.angle);

        ctx.fillStyle = "#3a3a3a";
        ctx.beginPath();
        ctx.arc(0, 0, 11, 0, Math.PI * 2);
        ctx.fill();

        ctx.fillStyle = "#888";
        ctx.fillRect(0, -3.5, 17, 7);
        ctx.strokeStyle = "#111";
        ctx.lineWidth = 1;
        ctx.strokeRect(0, -3.5, 17, 7);

        ctx.strokeStyle = t === selectedTurret ? "#ffd700" : "#1a1a1a";
        ctx.lineWidth = t === selectedTurret ? 2.5 : 1.2;
        ctx.beginPath(); ctx.arc(0, 0, 11, 0, Math.PI * 2); ctx.stroke();

        ctx.restore(); 
        
        let chargeRatio = Math.min(1, t.charge / t.maxCooldown);
        ctx.fillStyle = "#1a1a1a";
        ctx.fillRect(t.x - 11, t.y + 15, 22, 5);
        ctx.fillStyle = chargeRatio >= 1 ? "#00e676" : "#ffca28";
        ctx.fillRect(t.x - 11, t.y + 15, 22 * chargeRatio, 5);
    });

    // Лут
    loots.forEach(item => {
        if (item.type === "gold") ctx.fillStyle = "#ffd700";
        else if (item.type === "slime") ctx.fillStyle = "#32cd32";
        else ctx.fillStyle = "#e0eeee";
        ctx.beginPath(); ctx.arc(item.x, item.y, 5.5, 0, Math.PI*2); ctx.fill();
        if (item.isMagnetized) {
            ctx.strokeStyle = "rgba(255,160,0,0.6)";
            ctx.lineWidth = 1.5;
            ctx.stroke();
        }
    });

    // Зомби
    zombies.forEach(z => {
        ctx.fillStyle = z.color;
        ctx.beginPath(); ctx.arc(z.x, z.y, z.size, 0, Math.PI*2); ctx.fill();
        
        // Обводка для танков
        if (z.type === "tank") {
            ctx.strokeStyle = "#1a2a1a";
            ctx.lineWidth = 2;
            ctx.stroke();
        }
        
        let hpRatio = Math.max(0, z.hp / z.maxHp);
        ctx.fillStyle = "#222";
        ctx.fillRect(z.x - 9, z.y - z.size - 8, 18, 4);
        ctx.fillStyle = hpRatio > 0.5 ? "#76ff03" : (hpRatio > 0.25 ? "#ffeb3b" : "#ff1744");
        ctx.fillRect(z.x - 9, z.y - z.size - 8, 18 * hpRatio, 4);
    });

    // Выживший
    ctx.fillStyle = "#00e5ff";
    ctx.beginPath(); ctx.arc(survivor.x, survivor.y, survivor.size, 0, Math.PI*2); ctx.fill();
    ctx.strokeStyle = "#006064";
    ctx.lineWidth = 1.5;
    ctx.stroke();

    // Пули
    bullets.forEach(b => {
        ctx.fillStyle = "#ffee58";
        ctx.fillRect(b.x - 3.5, b.y - 3.5, 7, 7); 
    });

    // Частицы
    particles.forEach(p => {
        const alpha = Math.max(0, p.life / p.maxLife);
        ctx.globalAlpha = alpha;
        ctx.fillStyle = p.color;
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.size * alpha, 0, Math.PI*2);
        ctx.fill();
        ctx.globalAlpha = 1;
    });

    // Спецназ эффект
    if (specialOpsActiveTimer > 0) {
        ctx.fillStyle = "rgba(255, 30, 30, 0.12)";
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        
        ctx.strokeStyle = "rgba(255, 50, 50, 0.45)";
        ctx.lineWidth = 2;
        for (let i = 0; i < 6; i++) {
            ctx.beginPath();
            ctx.moveTo(Math.random() * canvas.width, 0);
            ctx.lineTo(Math.random() * canvas.width, canvas.height);
            ctx.stroke();
        }
        
        ctx.fillStyle = "#ff1744";
        ctx.font = "bold 22px Arial";
        ctx.textAlign = "center";
        ctx.fillText("ЗАЧИСТКА СПЕЦНАЗА!", canvas.width / 2, canvas.height / 2 + 110);
        ctx.textAlign = "left";
    }

    if (isPaused && gameState !== "GAME_OVER") {
        ctx.fillStyle = "rgba(0,0,0,0.55)";
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = "white";
        ctx.font = "32px Arial";
        ctx.textAlign = "center";
        ctx.fillText("ПАУЗА", canvas.width/2, 50);
        ctx.textAlign = "left";
    }
}

function gameLoop(timestamp) {
    let dt = timestamp - lastTime;
    lastTime = timestamp;

    if (dt > 80) dt = 16; 

    if (!isPaused) {
        for (let i = 0; i < gameSpeed; i++) {
            updateGame(dt);
        }
    }
    
    frameCount++;
    if (frameCount % 8 === 0) updateUI();
    
    drawGame();
    requestAnimationFrame(gameLoop);
}

// Старт
updateUI();
requestAnimationFrame(gameLoop);
</script>
