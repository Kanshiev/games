<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Wasteland Citadel Defense</title>
    <style>
        body { margin: 0; background: #222; color: #fff; font-family: sans-serif; overflow: hidden; }
        .header { display: flex; justify-content: space-between; align-items: center; padding: 10px 20px; background: #111; border-bottom: 1px solid #444; }
        .stats span { margin-right: 15px; font-weight: bold; color: #ccc; }
        .stats span b { color: #fff; }
        .controls button { padding: 8px 12px; margin-left: 5px; cursor: pointer; background: #444; color: #fff; border: 1px solid #666; border-radius: 4px; }
        .controls button:hover { background: #555; }
        
        .epic-controls { display: flex; justify-content: center; gap: 15px; padding: 10px; background: #1a1a1a; border-bottom: 2px solid #444; }
        .epic-controls button { padding: 8px 15px; font-weight: bold; cursor: pointer; border: none; border-radius: 4px; color: white; }
        .epic-controls button:disabled { background: #333 !important; color: #777 !important; cursor: not-allowed; }
        #heli-btn { background: #28a745; }
        #spec-ops-btn { background: #dc3545; }
        #upg-citadel-btn { background: #6c757d; }

        #game-container { position: relative; width: 800px; margin: 20px auto; }
        canvas { background: #343434; display: block; border: 4px solid #555; cursor: crosshair; }
        
        #upgrade-menu {
            display: none; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.9); border: 2px solid #777; padding: 20px; border-radius: 8px; text-align: center;
        }
        #upgrade-menu h3 { margin-top: 0; color: #ffd700; }
        .upg-btn { display: block; width: 100%; margin: 10px 0; padding: 10px; background: #444; color: #fff; border: 1px solid #777; cursor: pointer; }
        .upg-btn:hover { background: #555; }
        .upg-btn:disabled { background: #222; color: #555; border-color: #333; cursor: not-allowed; }
        
        #game-over {
            display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(150, 0, 0, 0.5); color: white; text-align: center; align-content: center; font-size: 30px; font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="header">
        <div class="stats">
            <span>Волна: <b id="wave-num">1</b></span>
            <span>Статус: <b id="status">Ожидание</b></span>
            <span>Монеты: <b id="gold" style="color:#ffd700;">0</b></span>
            <span>Слизь: <b id="slime" style="color:#32cd32;">0</b></span>
            <span>Кости: <b id="bones" style="color:#e0eeee;">0</b></span>
            <span>Стена: <b id="wall-hp">1000/1000</b></span>
        </div>
        <div class="controls">
            <button onclick="repairWall()" id="repair-btn" title="1 кость = 10 HP">Чинить стену (1 кость = 10 HP)</button>
            <button onclick="togglePause()" id="pause-btn">Пауза</button>
            <button onclick="saveGame()">Сохранить</button>
            <button onclick="loadGame()">Загрузить</button>
        </div>
    </div>

    <div class="epic-controls">
        <button id="heli-btn" onclick="buyHeli()">🚁 Ждем 3-ю волну...</button>
        <button id="spec-ops-btn" onclick="useSpecOps()" disabled>🔫 Вызвать Спецназ (0)</button>
        <button id="upg-citadel-btn" onclick="upgradeCitadel()">Укрепить Цитадель: 2000 ХП (1000 костей)</button>
    </div>

    <div id="game-container">
        <canvas id="gameCanvas" width="800" height="600"></canvas>
        
        <div id="upgrade-menu">
            <h3>Улучшение турели</h3>
            <button class="upg-btn" id="upg-range" onclick="buyUpgrade('range')">Дальность +25% (Цена: 10)</button>
            <button class="upg-btn" id="upg-speed" onclick="buyUpgrade('speed')">Скорость зарядки +25% (Цена: 10)</button>
            <button class="upg-btn" id="upg-damage" onclick="buyUpgrade('damage')">Урон +25% (Цена: 10)</button>
            <button class="upg-btn" onclick="closeUpgradeMenu()" style="background:#633;">Закрыть</button>
        </div>

        <div id="game-over">ЦИТАДЕЛЬ ПАЛА<br><span style="font-size: 20px; cursor: pointer; text-decoration: underline;" onclick="location.reload()">Начать заново</span></div>
    </div>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

// --- ИГРОВЫЕ ПЕРЕМЕННЫЕ ---
let isPaused = false;
let lastTime = performance.now();
let gameState = "WAITING"; 

let waveNumber = 1;
let baseZombies = 20;
let zombiesToSpawn = baseZombies;
let timeBetweenWaves = 10000; 
let spawnDelay = 1000; 

let timers = { waveWait: 3000, spawn: 0 };
let resources = { gold: 0, slime: 0, bones: 0 };

let citadelUpgradeLevel = 0;
const upgradeCosts = [1000, 5000, 10000];
const upgradeMaxHPs = [2000, 10000, 50000];
let specialOpsCharges = 0;
let specialOpsActiveTimer = 0; 

const citadel = {
    x: canvas.width / 2, y: canvas.height / 2,
    size: 140, maxHp: 1000, hp: 1000, wallThickness: 15
};

const survivor = { x: citadel.x, y: citadel.y, speed: 120, size: 8, targetLoot: null };

function createTurrets() {
    const offset = citadel.size / 2 - 10;
    return [
        { x: citadel.x - offset, y: citadel.y - offset, range: 120, maxCooldown: 2000, charge: 0, damage: 10, angle: Math.PI + Math.PI/4, cost: { range: 10, speed: 10, damage: 10 } },
        { x: citadel.x + offset, y: citadel.y - offset, range: 120, maxCooldown: 2000, charge: 0, damage: 10, angle: -Math.PI/4, cost: { range: 10, speed: 10, damage: 10 } },
        { x: citadel.x - offset, y: citadel.y + offset, range: 120, maxCooldown: 2000, charge: 0, damage: 10, angle: Math.PI - Math.PI/4, cost: { range: 10, speed: 10, damage: 10 } },
        { x: citadel.x + offset, y: citadel.y + offset, range: 120, maxCooldown: 2000, charge: 0, damage: 10, angle: Math.PI/4, cost: { range: 10, speed: 10, damage: 10 } }
    ];
}

let turrets = createTurrets();
let zombies = [];
let bullets = [];
let loots = [];
let selectedTurret = null;

function saveGame() {
    const data = { 
        waveNumber, zombiesToSpawn, resources, hp: citadel.hp, maxHp: citadel.maxHp,
        turrets, gameState, timers, citadelUpgradeLevel, specialOpsCharges 
    };
    localStorage.setItem("citadelSave", JSON.stringify(data));
    alert("Игра сохранена!");
}

function loadGame() {
    const save = localStorage.getItem("citadelSave");
    if (save) {
        const data = JSON.parse(save);
        waveNumber = data.waveNumber;
        zombiesToSpawn = data.zombiesToSpawn;
        resources = data.resources;
        citadel.hp = data.hp;
        citadel.maxHp = data.maxHp || 1000;
        turrets = data.turrets;
        gameState = data.gameState === "GAME_OVER" ? "WAITING" : data.gameState; 
        timers = data.timers;
        citadelUpgradeLevel = data.citadelUpgradeLevel || 0;
        specialOpsCharges = data.specialOpsCharges || 0;
        
        zombies = []; bullets = []; loots = [];
        survivor.x = citadel.x; survivor.y = citadel.y;
        updateUI();
    } else {
        alert("Нет сохранений!");
    }
}

function buyHeli() {
    if (waveNumber % 3 === 0 && resources.slime >= 100) {
        resources.slime -= 100;
        specialOpsCharges++;
        updateUI();
    }
}

function useSpecOps() {
    if (specialOpsCharges > 0 && specialOpsActiveTimer <= 0) {
        specialOpsCharges--;
        specialOpsActiveTimer = 5000; 
        updateUI();
    }
}

function upgradeCitadel() {
    if (citadelUpgradeLevel >= upgradeCosts.length) return;
    let cost = upgradeCosts[citadelUpgradeLevel];
    if (resources.bones >= cost) {
        resources.bones -= cost;
        citadel.maxHp = upgradeMaxHPs[citadelUpgradeLevel];
        citadel.hp = citadel.maxHp; 
        citadelUpgradeLevel++;
        updateUI();
    }
}

function togglePause() {
    if (gameState === "GAME_OVER") return;
    isPaused = !isPaused;
    document.getElementById("pause-btn").innerText = isPaused ? "Продолжить" : "Пауза";
    lastTime = performance.now(); 
}

function repairWall() {
    if (resources.bones >= 1 && citadel.hp < citadel.maxHp && gameState !== "GAME_OVER") {
        resources.bones--;
        citadel.hp = Math.min(citadel.maxHp, citadel.hp + 10); 
        updateUI();
    }
}

canvas.addEventListener('mousedown', (e) => {
    if (gameState === "GAME_OVER") return;
    const rect = canvas.getBoundingClientRect();
    const mx = e.clientX - rect.left;
    const my = e.clientY - rect.top;

    turrets.forEach(t => {
        if (Math.hypot(t.x - mx, t.y - my) < 20) {
            selectedTurret = t;
            showUpgradeMenu();
        }
    });
});

function showUpgradeMenu() {
    if (!isPaused) togglePause();
    const menu = document.getElementById("upgrade-menu");
    menu.style.display = "block";
    updateUpgradeButtons();
}

function closeUpgradeMenu() {
    document.getElementById("upgrade-menu").style.display = "none";
    selectedTurret = null;
}

function updateUpgradeButtons() {
    if (!selectedTurret) return;
    const btnR = document.getElementById("upg-range");
    const btnS = document.getElementById("upg-speed");
    const btnD = document.getElementById("upg-damage");

    btnR.innerText = `Дальность +25% (Цена: ${selectedTurret.cost.range})`;
    btnR.disabled = resources.gold < selectedTurret.cost.range;
    btnS.innerText = `Скорость зарядки +25% (Цена: ${selectedTurret.cost.speed})`;
    btnS.disabled = resources.gold < selectedTurret.cost.speed;
    btnD.innerText = `Урон +25% (Цена: ${selectedTurret.cost.damage})`;
    btnD.disabled = resources.gold < selectedTurret.cost.damage;
}

function buyUpgrade(type) {
    if (!selectedTurret) return;
    let cost = selectedTurret.cost[type];
    
    if (resources.gold >= cost) {
        resources.gold -= cost;
        if (type === 'range') selectedTurret.range *= 1.25;
        if (type === 'speed') selectedTurret.maxCooldown *= 0.75;
        if (type === 'damage') selectedTurret.damage *= 1.25;
        
        selectedTurret.cost[type] = Math.floor(cost * 1.5);
        updateUI();
        updateUpgradeButtons();
    }
}

function spawnZombie() {
    let x, y;
    const edge = Math.floor(Math.random() * 4);
    if (edge === 0) { x = Math.random() * canvas.width; y = -20; }
    else if (edge === 1) { x = canvas.width + 20; y = Math.random() * canvas.height; }
    else if (edge === 2) { x = Math.random() * canvas.width; y = canvas.height + 20; }
    else { x = -20; y = Math.random() * canvas.height; }

    let zHp = 50 + waveNumber * 5;
    // Снижена базовая скорость зомби в 2 раза
    let baseSpeed = 7.5 + Math.random() * 5;
    let zSpeed = baseSpeed * Math.pow(1.02, waveNumber - 1);

    zombies.push({
        x: x, y: y, hp: zHp, maxHp: zHp, 
        speed: zSpeed, size: 10, attackTimer: 0
    });
}

function updateUI() {
    document.getElementById("wave-num").innerText = waveNumber;
    document.getElementById("gold").innerText = resources.gold;
    document.getElementById("slime").innerText = resources.slime;
    document.getElementById("bones").innerText = resources.bones;
    document.getElementById("wall-hp").innerText = `${Math.floor(citadel.hp)}/${citadel.maxHp}`;
    
    document.getElementById("repair-btn").disabled = resources.bones < 1 || citadel.hp >= citadel.maxHp;

    const statusEl = document.getElementById("status");
    if (gameState === "WAITING") statusEl.innerText = `До волны: ${Math.max(0, Math.ceil(timers.waveWait / 1000))}с`;
    else if (gameState === "WAVE") statusEl.innerText = `Врагов: ${zombies.length + zombiesToSpawn}`;
    else if (gameState === "LOOTING") statusEl.innerText = `Сбор лута...`;

    let heliBtn = document.getElementById("heli-btn");
    if (waveNumber % 3 === 0) {
        heliBtn.innerText = `🚁 Купить рацию Спецназа (100 Слизи)`;
        heliBtn.disabled = resources.slime < 100;
        heliBtn.style.background = resources.slime >= 100 ? "#28a745" : "#555";
    } else {
        let nextWave = waveNumber + (3 - (waveNumber % 3));
        heliBtn.innerText = `🚁 Вертолет прилетит на ${nextWave} волне`;
        heliBtn.disabled = true;
        heliBtn.style.background = "#555";
    }

    let specOpsBtn = document.getElementById("spec-ops-btn");
    specOpsBtn.innerText = `🔫 Вызвать Спецназ (${specialOpsCharges})`;
    specOpsBtn.disabled = specialOpsCharges <= 0 || specialOpsActiveTimer > 0;

    let upgCitBtn = document.getElementById("upg-citadel-btn");
    if (citadelUpgradeLevel === 0) {
        upgCitBtn.innerText = `Укрепить Цитадель: 2000 ХП (1000 костей)`;
        upgCitBtn.disabled = resources.bones < 1000;
    } else if (citadelUpgradeLevel === 1) {
        upgCitBtn.innerText = `Бетонная стена: 10000 ХП (5000 костей)`;
        upgCitBtn.disabled = resources.bones < 5000;
    } else if (citadelUpgradeLevel === 2) {
        upgCitBtn.innerText = `Железобетон: 50000 ХП (10000 костей)`;
        upgCitBtn.disabled = resources.bones < 10000;
    } else {
        upgCitBtn.innerText = `Цитадель улучшена до максимума!`;
        upgCitBtn.disabled = true;
    }
}

function updateGame(dt) {
    if (citadel.hp <= 0) {
        gameState = "GAME_OVER";
        document.getElementById("game-over").style.display = "block";
        return;
    }

    if (specialOpsActiveTimer > 0) {
        specialOpsActiveTimer -= dt;
        if (zombies.length > 0) {
            zombies.forEach(z => {
                let rand = Math.random();
                let type = "gold";
                if (rand > 0.4 && rand <= 0.7) type = "slime";
                else if (rand > 0.7) type = "bones";
                loots.push({ x: z.x, y: z.y, type: type });
            });
            zombies = [];
        }
    }

    if (gameState === "WAITING") {
        timers.waveWait -= dt;
        if (timers.waveWait <= 0) {
            gameState = "WAVE";
            zombiesToSpawn = Math.floor(baseZombies * Math.pow(1.1, waveNumber - 1));
            timers.spawn = 0;
            updateUI(); 
        }
    }

    if (gameState === "WAVE") {
        if (zombiesToSpawn > 0) {
            timers.spawn -= dt;
            if (timers.spawn <= 0) {
                spawnZombie();
                zombiesToSpawn--;
                timers.spawn = spawnDelay;
            }
        } else if (zombies.length === 0) {
            gameState = loots.length > 0 ? "LOOTING" : "WAITING";
            if (gameState === "WAITING") {
                waveNumber++;
                timers.waveWait = timeBetweenWaves;
                updateUI();
            }
        }
    }

    const wallRadius = citadel.size / 2 + citadel.wallThickness / 2;
    for (let i = zombies.length - 1; i >= 0; i--) {
        let z = zombies[i];
        let dx = citadel.x - z.x;
        let dy = citadel.y - z.y;
        let dist = Math.hypot(dx, dy);

        if (dist > wallRadius + z.size) {
            z.x += (dx / dist) * z.speed * (dt / 1000);
            z.y += (dy / dist) * z.speed * (dt / 1000); 
        } else {
            z.attackTimer += dt;
            if (z.attackTimer >= 1000) { 
                citadel.hp -= 1; // Урон снижен с 2 до 1
                z.attackTimer = 0;
            }
        }
    }

    turrets.forEach(t => {
        let target = null;
        let minDist = t.range;
        if (gameState === "WAVE" && zombies.length > 0) {
            zombies.forEach(z => {
                let d = Math.hypot(z.x - t.x, z.y - t.y);
                if (d <= minDist) { minDist = d; target = z; }
            });
        }

        if (target) {
            t.angle = Math.atan2(target.y - t.y, target.x - t.x);
        }

        if (gameState === "WAVE") {
            if (t.charge < t.maxCooldown) {
                t.charge += dt;
            } else if (target) {
                let tx = target.x - t.x;
                let ty = target.y - t.y;
                let tDist = Math.hypot(tx, ty);
                bullets.push({
                    x: t.x + Math.cos(t.angle) * 12, 
                    y: t.y + Math.sin(t.angle) * 12, 
                    vx: (tx / tDist) * 400, vy: (ty / tDist) * 400, damage: t.damage
                });
                t.charge = 0; 
            }
        } else {
            t.charge = t.maxCooldown;
        }
    });

    for (let i = bullets.length - 1; i >= 0; i--) {
        let b = bullets[i];
        b.x += b.vx * (dt / 1000);
        b.y += b.vy * (dt / 1000);

        let hit = false;
        for (let j = zombies.length - 1; j >= 0; j--) {
            let z = zombies[j];
            if (Math.hypot(b.x - z.x, b.y - z.y) < z.size + 4) {
                z.hp -= b.damage;
                hit = true;
                if (z.hp <= 0) {
                    let rand = Math.random();
                    let type = "gold";
                    if (rand > 0.4 && rand <= 0.7) type = "slime";
                    else if (rand > 0.7) type = "bones";
                    
                    loots.push({ x: z.x, y: z.y, type: type });
                    zombies.splice(j, 1);
                }
                break;
            }
        }
        
        if (hit || b.x < 0 || b.x > canvas.width || b.y < 0 || b.y > canvas.height) {
            bullets.splice(i, 1);
        }
    }

    if (gameState === "LOOTING") {
        if (loots.length === 0) {
            let dx = citadel.x - survivor.x;
            let dy = citadel.y - survivor.y;
            let dist = Math.hypot(dx, dy);
            if (dist > 5) {
                survivor.x += (dx / dist) * survivor.speed * (dt / 1000);
                survivor.y += (dy / dist) * survivor.speed * (dt / 1000);
            } else {
                gameState = "WAITING";
                waveNumber++;
                timers.waveWait = timeBetweenWaves;
                updateUI();
            }
        } else {
            if (!survivor.targetLoot || !loots.includes(survivor.targetLoot)) {
                let minDist = Infinity;
                loots.forEach(item => {
                    let d = Math.hypot(item.x - survivor.x, item.y - survivor.y);
                    if (d < minDist) { minDist = d; survivor.targetLoot = item; }
                });
            }

            if (survivor.targetLoot) {
                let dx = survivor.targetLoot.x - survivor.x;
                let dy = survivor.targetLoot.y - survivor.y;
                let dist = Math.hypot(dx, dy);
                let moveDist = survivor.speed * (dt / 1000);

                if (dist > moveDist) {
                    survivor.x += (dx / dist) * moveDist;
                    survivor.y += (dy / dist) * moveDist;
                } else {
                    resources[survivor.targetLoot.type]++;
                    loots.splice(loots.indexOf(survivor.targetLoot), 1);
                    survivor.targetLoot = null;
                }
            }
        }
    } else {
        let dx = citadel.x - survivor.x;
        let dy = citadel.y - survivor.y;
        let dist = Math.hypot(dx, dy);
        if (dist > 2) {
            survivor.x += (dx / dist) * survivor.speed * (dt / 1000);
            survivor.y += (dy / dist) * survivor.speed * (dt / 1000);
        }
    }
}

function drawGame() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    turrets.forEach(t => {
        ctx.fillStyle = "rgba(255, 255, 255, 0.03)";
        ctx.beginPath(); ctx.arc(t.x, t.y, t.range, 0, Math.PI*2); ctx.fill();
    });

    let wallHealthRatio = citadel.hp / citadel.maxHp;
    ctx.fillStyle = "#333";
    ctx.fillRect(citadel.x - citadel.size/2, citadel.y - citadel.size/2, citadel.size, citadel.size);
    
    if (citadelUpgradeLevel === 0) ctx.strokeStyle = `rgb(${255 - wallHealthRatio * 150}, ${wallHealthRatio * 150}, 50)`;
    else if (citadelUpgradeLevel === 1) ctx.strokeStyle = `#888`; 
    else if (citadelUpgradeLevel === 2) ctx.strokeStyle = `#556`; 
    else ctx.strokeStyle = `#345`; 
    
    ctx.lineWidth = citadel.wallThickness + (citadelUpgradeLevel * 2); 
    ctx.strokeRect(citadel.x - citadel.size/2, citadel.y - citadel.size/2, citadel.size, citadel.size);

    turrets.forEach(t => {
        ctx.save();
        ctx.translate(t.x, t.y);
        ctx.rotate(t.angle);

        ctx.fillStyle = "#444";
        ctx.beginPath();
        ctx.arc(0, 0, 10, 0, Math.PI * 2);
        ctx.fill();

        ctx.fillStyle = "#777";
        ctx.fillRect(0, -3, 16, 6);
        ctx.strokeStyle = "#111";
        ctx.lineWidth = 1;
        ctx.strokeRect(0, -3, 16, 6);

        ctx.strokeStyle = t === selectedTurret ? "#ffd700" : "#222";
        ctx.lineWidth = t === selectedTurret ? 2 : 1;
        ctx.beginPath(); ctx.arc(0, 0, 10, 0, Math.PI * 2); ctx.stroke();

        ctx.restore(); 
        
        let chargeRatio = t.charge / t.maxCooldown;
        ctx.fillStyle = "#222";
        ctx.fillRect(t.x - 10, t.y + 14, 20, 4);
        ctx.fillStyle = chargeRatio >= 1 ? "#00ff00" : "#ffdd44";
        ctx.fillRect(t.x - 10, t.y + 14, 20 * chargeRatio, 4);
    });

    loots.forEach(item => {
        if (item.type === "gold") ctx.fillStyle = "#ffd700";
        else if (item.type === "slime") ctx.fillStyle = "#32cd32";
        else ctx.fillStyle = "#e0eeee";
        ctx.beginPath(); ctx.arc(item.x, item.y, 5, 0, Math.PI*2); ctx.fill();
    });

    zombies.forEach(z => {
        ctx.fillStyle = "#5d7a42";
        ctx.beginPath(); ctx.arc(z.x, z.y, z.size, 0, Math.PI*2); ctx.fill();
        
        let hpRatio = z.hp / z.maxHp;
        ctx.fillStyle = "red";
        ctx.fillRect(z.x - 8, z.y - 15, 16, 3);
        ctx.fillStyle = "lime";
        ctx.fillRect(z.x - 8, z.y - 15, 16 * hpRatio, 3);
    });

    ctx.fillStyle = "#00bcd4";
    ctx.beginPath(); ctx.arc(survivor.x, survivor.y, survivor.size, 0, Math.PI*2); ctx.fill();

    bullets.forEach(b => {
        ctx.fillStyle = "#ffdd44";
        ctx.fillRect(b.x - 3, b.y - 3, 6, 6); 
    });

    if (specialOpsActiveTimer > 0) {
        ctx.fillStyle = "rgba(255, 0, 0, 0.1)";
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        
        ctx.strokeStyle = "rgba(255, 0, 0, 0.5)";
        ctx.lineWidth = 2;
        for (let i = 0; i < 5; i++) {
            ctx.beginPath();
            ctx.moveTo(Math.random() * canvas.width, 0);
            ctx.lineTo(Math.random() * canvas.width, canvas.height);
            ctx.stroke();
        }
        
        ctx.fillStyle = "red";
        ctx.font = "bold 24px Arial";
        ctx.fillText("ЗАЧИСТКА СПЕЦНАЗА АКТИВНА!", canvas.width / 2 - 200, canvas.height / 2 + 100);
    }

    if (isPaused && gameState !== "GAME_OVER") {
        ctx.fillStyle = "rgba(0,0,0,0.5)";
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = "white";
        ctx.font = "30px Arial";
        ctx.fillText("ПАУЗА", canvas.width/2 - 50, 40);
    }
}

function gameLoop(timestamp) {
    let dt = timestamp - lastTime;
    lastTime = timestamp;

    if (!isPaused) {
        updateGame(dt);
    }
    
    if (Math.floor(timestamp) % 10 === 0) updateUI();
    
    drawGame();

    requestAnimationFrame(gameLoop);
}

requestAnimationFrame(gameLoop);
</script>
</body>
</html>
