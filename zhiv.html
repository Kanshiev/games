<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Wasteland Agent: Core Mechanics</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
    <style>
        body { margin: 0; background-color: #050505; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        #game-container { border: 3px solid #222; }
    </style>
</head>
<body>

<div id="game-container"></div>

<script>
    class GameScene extends Phaser.Scene {
        constructor() {
            super('GameScene');
        }

        create() {
            // Размеры мира
            const GRID_SIZE = 60;
            const TILE_SIZE = 32;
            const worldWidth = GRID_SIZE * TILE_SIZE;
            const worldHeight = GRID_SIZE * TILE_SIZE;

            this.physics.world.setBounds(0, 0, worldWidth, worldHeight);

            // Игровые данные (Инвентарь и Жизни)
            this.playerStats = {
                lives: 3,
                slugs: 0,
                intel: 0,
                chestIntel: 0,
                npcSlugs: 0
            };
            this.isInvulnerable = false; // Флаг временной неуязвимости при уроне

            // Стены заброшек
            this.walls = this.physics.add.staticGroup();

            // Отрисовка земли
            let bgGraphics = this.add.graphics();
            bgGraphics.fillStyle(0x111111, 1);
            bgGraphics.fillRect(0, 0, worldWidth, worldHeight);

            // Отрисовка базы (зеленый квадрат в центре)
            const baseStart = Math.floor(GRID_SIZE / 2) - 5;
            const baseSizePx = 10 * TILE_SIZE;
            const baseXPx = baseStart * TILE_SIZE;
            const baseYPx = baseStart * TILE_SIZE;
            
            bgGraphics.fillStyle(0x1b4d22, 1);
            bgGraphics.fillRect(baseXPx, baseYPx, baseSizePx, baseSizePx);

            // Генерация заброшек вокруг базы
            for (let i = 0; i < 20; i++) {
                let roomW = Phaser.Math.Between(5, 9);
                let roomH = Phaser.Math.Between(5, 9);
                let roomX = Phaser.Math.Between(1, GRID_SIZE - roomW - 2);
                let roomY = Phaser.Math.Between(1, GRID_SIZE - roomH - 2);

                if (roomX + roomW > baseStart - 2 && roomX < baseStart + 12 &&
                    roomY + roomH > baseStart - 2 && roomY < baseStart + 12) {
                    continue;
                }

                for (let x = roomX; x < roomX + roomW; x++) {
                    for (let y = roomY; y < roomY + roomH; y++) {
                        if (x === roomX || x === roomX + roomW - 1 || y === roomY || y === roomY + roomH - 1) {
                            if (Phaser.Math.Between(0, 8) === 0) continue; // Проход в стене
                            let wall = this.add.rectangle(x * TILE_SIZE + TILE_SIZE/2, y * TILE_SIZE + TILE_SIZE/2, TILE_SIZE, TILE_SIZE, 0x5c4033);
                            this.walls.add(wall);
                        }
                    }
                }
            }

            // Интерактивные объекты на базе: Сундук и NPC (Упырь)
            this.chest = this.add.rectangle(baseXPx + 100, baseYPx + 100, 24, 24, 0x00aaff);
            this.npc = this.add.rectangle(baseXPx + baseSizePx - 100, baseYPx + 100, 24, 24, 0xffaa00);
            this.physics.add.existing(this.chest, true);
            this.physics.add.existing(this.npc, true);

            // Текст над NPC и сундуком
            this.add.text(this.chest.x - 30, this.chest.y - 25, 'Сундук', { fontSize: '12px', fill: '#00aaff' });
            this.add.text(this.npc.x - 25, this.npc.y - 25, 'Упырь', { fontSize: '12px', fill: '#ffaa00' });

            // Игрок (белый круг)
            this.player = this.add.circle(baseXPx + baseSizePx/2, baseYPx + baseSizePx/2, 12, 0xffffff);
            this.physics.add.existing(this.player);
            this.player.body.setCollideWorldBounds(true);
            this.physics.add.collider(this.player, this.walls);

            // Группы лута
            this.slugsGroup = this.physics.add.group();
            this.intelGroup = this.physics.add.group();
            this.heartsGroup = this.physics.add.group();

            // Спавн лута случайным образом на карте (за пределами базы)
            this.spawnLoot(this.slugsGroup, 25, 0x00ff00, 6);   // Слизни (зеленые мелкие)
            this.spawnLoot(this.intelGroup, 15, 0x0000ff, 6);   // Флешки (синие мелкие)
            this.spawnLoot(this.heartsGroup, 5, 0xff0055, 8);   // Сердечки (розово-красные)

            // Группа зомби (красные точки)
            this.zombiesGroup = this.physics.add.group();
            this.spawnZombies(30, baseXPx, baseYPx, baseSizePx);

            // Столкновения зомби со стенами
            this.physics.add.collider(this.zombiesGroup, this.walls);

            // Обработка сбора лута игроком
            this.physics.add.overlap(this.player, this.slugsGroup, this.collectSlug, null, this);
            this.physics.add.overlap(this.player, this.intelGroup, this.collectIntel, null, this);
            this.physics.add.overlap(this.player, this.heartsGroup, this.collectHeart, null, this);

            // Обработка разгрузки лута на базе
            this.physics.add.overlap(this.player, this.chest, this.depositIntel, null, this);
            this.physics.add.overlap(this.player, this.npc, this.depositSlugs, null, this);

            // Столкновение игрока с зомби
            this.physics.add.overlap(this.player, this.zombiesGroup, this.hitPlayer, null, this);

            // Камера
            this.cameras.main.setBounds(0, 0, worldWidth, worldHeight);
            this.cameras.main.startFollow(this.player, true, 0.1, 0.1);
            this.cameras.main.setZoom(1.2);

            // UI Интерфейс (зафиксирован на экране)
            this.uiText = this.add.text(20, 20, '', { font: '16px Courier', fill: '#00ff00', backgroundColor: '#000000' });
            this.uiText.setScrollFactor(0);
            this.updateUI();

            // Управление
            this.cursors = this.input.keyboard.createCursorKeys();
            this.wasd = this.input.keyboard.addKeys('W,A,S,D');
        }

        // Вспомогательная функция спавна лута
        spawnLoot(group, count, color, size) {
            for (let i = 0; i < count; i++) {
                let x = Phaser.Math.Between(50, 50 * 32);
                let y = Phaser.Math.Between(50, 50 * 32);
                let item = this.add.circle(x, y, size, color);
                group.add(item);
            }
        }

        // Спавн зомби вне зоны базы
        spawnZombies(count, baseX, baseY, baseSize) {
            for (let i = 0; i < count; i++) {
                let x, y;
                // Ищем координаты, пока они попадают на базу
                do {
                    x = Phaser.Math.Between(50, 58 * 32);
                    y = Phaser.Math.Between(50, 58 * 32);
                } while (x > baseX && x < baseX + baseSize && y > baseY && y < baseY + baseSize);

                let zombie = this.add.circle(x, y, 10, 0xff0000); // Красная точка
                this.zombiesGroup.add(zombie);
                zombie.body.setCollideWorldBounds(true);
            }
        }

        // Логика сбора предметов
        collectSlug(player, slug) {
            slug.destroy();
            this.playerStats.slugs++;
            this.updateUI();
        }

        collectIntel(player, intel) {
            intel.destroy();
            this.playerStats.intel++;
            this.updateUI();
        }

        collectHeart(player, heart) {
            if (this.playerStats.lives < 3) {
                heart.destroy();
                this.playerStats.lives++;
                this.updateUI();
            }
        }

        // Логика сдачи предметов
        depositIntel() {
            if (this.playerStats.intel > 0) {
                this.playerStats.chestIntel += this.playerStats.intel;
                this.playerStats.intel = 0;
                this.updateUI();
            }
        }

        depositSlugs() {
            if (this.playerStats.slugs > 0) {
                this.playerStats.npcSlugs += this.playerStats.slugs;
                this.playerStats.slugs = 0;
                this.updateUI();
            }
        }

        // Логика получения урона от зомби
        hitPlayer(player, zombie) {
            if (this.isInvulnerable) return;

            this.playerStats.lives--;
            this.updateUI();

            if (this.playerStats.lives <= 0) {
                alert("Агент погиб! Возвращение на базу...");
                this.playerStats.lives = 3;
                this.playerStats.slugs = 0;
                this.playerStats.intel = 0;
                // Возврат в центр карты
                this.player.x = 30 * 32;
                this.player.y = 30 * 32;
                this.updateUI();
            } else {
                // Включаем эффект мигания неуязвимости на 1 секунду
                this.isInvulnerable = true;
                this.tweens.add({
                    targets: this.player,
                    alpha: 0.2,
                    duration: 100,
                    yoyo: true,
                    repeat: 5,
                    onComplete: () => {
                        this.player.alpha = 1;
                        this.isInvulnerable = false;
                    }
                });
            }
        }

        updateUI() {
            let heartsText = '❤️'.repeat(this.playerStats.lives);
            this.uiText.setText(
                `Жизни: ${heartsText}\n` +
                `С собой слизней: ${this.playerStats.slugs} | Флешек: ${this.playerStats.intel}\n` +
                `В сундуке данных: ${this.playerStats.chestIntel}\n` +
                `Отдано Упырю слизней: ${this.playerStats.npcSlugs}`
            );
        }

        update() {
            // Скорость игрока
            const playerSpeed = 220;
            this.player.body.setVelocity(0);

            if (this.cursors.left.isDown || this.wasd.A.isDown) this.player.body.setVelocityX(-playerSpeed);
            else if (this.cursors.right.isDown || this.wasd.D.isDown) this.player.body.setVelocityX(playerSpeed);

            if (this.cursors.up.isDown || this.wasd.W.isDown) this.player.body.setVelocityY(-playerSpeed);
            else if (this.cursors.down.isDown || this.wasd.S.isDown) this.player.body.setVelocityY(playerSpeed);

            // Медленное хаотичное движение зомби
            const zombieSpeed = 40; 
            this.zombiesGroup.children.iterate(zombie => {
                // С шансом 1% в кадр меняем направление движения зомби
                if (Phaser.Math.Between(0, 100) === 0) {
                    let angle = Phaser.Math.Between(0, 360);
                    this.physics.velocityFromAngle(angle, zombieSpeed, zombie.body.velocity);
                }
            });
        }
    }

    const config = {
        type: Phaser.AUTO,
        width: 800,
        height: 600,
        parent: 'game-container',
        physics: {
            default: 'arcade',
            arcade: { debug: false }
        },
        scene: [GameScene]
    };

    const game = new Phaser.Game(config);
</script>

</body>
</html>
