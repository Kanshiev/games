<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Wasteland Agent: Missions & Quests</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
    <style>
        body { 
            margin: 0; background-color: #050505; display: flex; justify-content: center; 
            align-items: center; height: 100vh; overflow: hidden; 
            font-family: 'Courier New', Courier, monospace; color: #00ff00; gap: 20px; 
        }
        .side-panel {
            width: 280px; height: 600px; background-color: #0a0a0a; border: 3px solid #222;
            padding: 15px; box-sizing: border-box; display: flex; flex-direction: column;
            box-shadow: 0 0 15px rgba(0, 255, 0, 0.05); gap: 10px;
        }
        .ui-section { border-bottom: 1px dashed #333; padding-bottom: 10px; }
        .ui-section:last-child { border-bottom: none; }
        h3 { margin: 0 0 8px 0; color: #777; font-size: 15px; text-align: center; }
        .stat-row { margin-bottom: 5px; font-size: 13px; display: flex; justify-content: space-between; align-items: center; }
        .val { font-weight: bold; color: #fff; }
        .val-gold { font-weight: bold; color: #ffd700; }
        .val-cyan { font-weight: bold; color: #00ffff; }
        .val-grey { font-weight: bold; color: #c0c0c0; }
        .val-purple { font-weight: bold; color: #a020f0; }

        button {
            background: #111; border: 1px solid #333; color: #0f0; padding: 5px; 
            cursor: pointer; font-family: inherit; width: 100%; margin-top: 5px; transition: 0.2s;
        }
        button:hover { background: #222; color: #fff; }
        button:disabled { border-color: #333; color: #444; cursor: not-allowed; }
        
        .btn-evac { background: #400; border-color: #f00; color: #f00; font-weight: bold; padding: 10px; display: none; }
        .btn-evac:hover { background: #f00; color: #fff; }

        #log-messages { flex-grow: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 8px; padding-right: 5px; }
        #log-messages::-webkit-scrollbar { width: 5px; }
        #log-messages::-webkit-scrollbar-thumb { background: #333; border-radius: 5px; }
        #game-container { border: 3px solid #222; box-shadow: 0 0 20px rgba(0,255,0,0.1); cursor: crosshair; }
    </style>
</head>
<body>

<div id="ui-panel" class="side-panel">
    <div class="ui-section">
        <h3>АГЕНТ</h3>
        <div class="stat-row"><span>❤️ Здоровье:</span> <span id="ui-lives" class="val">3 / 3</span></div>
        <div class="stat-row"><span>🛡️ Броня:</span> <span id="ui-armor" class="val-grey">0 / 5</span></div>
        <button onclick="window.gameScene.buyMedkit()">Купить Аптечку (10 монет)</button>
    </div>
    
    <div class="ui-section" id="weapon-section" style="display: none;">
        <h3>ОРУЖИЕ</h3>
        <div class="stat-row"><span>🔫 Пистолет</span> <span>Патроны: <span id="ui-ammo" class="val-gold">0</span></span></div>
    </div>

    <div class="ui-section">
        <h3>ИНВЕНТАРЬ</h3>
        <div class="stat-row"><span>Слизней:</span> <span id="ui-slugs" class="val">0</span></div>
        <div class="stat-row"><span>Монеток:</span> <span id="ui-coins" class="val-gold">0</span></div>
        <div class="stat-row"><span>Микросхем:</span> <span id="ui-chips" class="val-cyan">0</span></div>
        <div class="stat-row"><span>Рука Упыря:</span> <span id="ui-hand" class="val-purple">Нет</span></div>
    </div>

    <div class="ui-section">
        <h3>МИССИЯ</h3>
        <div class="stat-row"><span>Флешек собрано:</span> <span id="ui-intel" class="val-cyan">0 / 10</span></div>
        <button id="btn-finish" class="btn-evac" onclick="window.gameScene.finishMission()">ВЫЗВАТЬ ОПЕРГРУППУ</button>
    </div>
</div>

<div id="game-container"></div>

<div id="log-panel" class="side-panel">
    <h3>ЖУРНАЛ</h3>
    <div id="log-messages"></div>
</div>

<script>
    class GameScene extends Phaser.Scene {
        constructor() { super('GameScene'); }

        // Метод init получает данные из предыдущей сцены (для сохранения лута при переходе)
        init(data) {
            if (data && data.playerStats) {
                this.playerStats = data.playerStats;
            } else {
                this.playerStats = {
                    lives: 3, armor: 0, slugs: 0, intel: 0, coins: 0, chips: 0,
                    hasWeapon: false, ammo: 0, npcSlugs: 0,
                    hasHand: false, questHandDelivered: false
                };
            }
        }

        create() {
            window.gameScene = this; // Экспорт для HTML-кнопок

            const GRID_SIZE = 60, TILE_SIZE = 32;
            const worldWidth = GRID_SIZE * TILE_SIZE, worldHeight = GRID_SIZE * TILE_SIZE;

            this.physics.world.setBounds(0, 0, worldWidth, worldHeight);
            
            this.isInvulnerable = false;
            this.lastNpcTalkTime = 0;
            this.lastDroneAction = 0;

            this.npcJokes = [
                "Пули — это хорошо. Но слизни надежнее. Они хотя бы не рикошетят.",
                "Стреляй им по коленям! А, стоп, это из другой игры.",
                "Не трать патроны на меня, я уже наполовину мертв.",
                "Главное правило Пустоши: если оно шевелится — стреляй. Если светится — беги.",
                "О, монетки собираешь? Зря, ими даже костер нормально не разожжешь.",
                "Раньше меня тоже вела дорога приключений, а потом... кислотный дождь прожег мне колено.",
                "Помню, строил автоматизацию умного дома. Теперь тут только умная плесень.",
                "Знаешь, в чем плюс конца света? Больше не нужно платить за коммуналку!",
                "Я бы предложил тебе чаю, но последняя заварка мутировала и сожрала мою кружку.",
                "Эти слизни на вкус как жженая резина. Неси еще, я подсел.",
                "Отличная погодка сегодня. Всего минус два радтаракана на квадратный метр.",
                "Улыбнись, Агент. Хуже уже не будет. Ну, до прилета десанта зачистки.",
                "Вчера пытался вспомнить вкус пиццы... В итоге вспомнил только вкус крысиного хвоста. М-да.",
                "Если зомби откусит тебе ногу — не переживай. У меня есть отличный рецепт супа из голени!",
                "Знаешь, почему утырки всегда ходят толпой? Одиночество в этом мире слишком... убойное.",
                "Дрон сегодня так шумел винтами, что я чуть не отдал концы раньше времени. Принес хоть патроны?",
                "Там в заброшках кондиционеры до сих пор работают. Жаль, внутри только замороженные трупы.",
                "Мой левый глаз теперь видит в инфракрасном спектре. Правда, только когда я засыпаю.",
                "Не наступай на те зеленые лужи. Мой знакомый наступил — теперь мы зовем его 'Фонарик'.",
                "Агент, если штаб решит нас разбомбить, пообещай, что спрячешь меня в сундук. Там уютно.",
                "Слышал вой на севере? Это местный хор зомби. Репетируют перед твоим приходом.",
                "Иногда мне кажется, что вся эта нечисть просто хочет обнимашек. Очень крепких и зубастых.",
                "Эй, командир, закажи у Дрона туалетную бумагу. Газеты довоенных времен слишком... жестко критикуют.",
                "Если найдешь в домах консервы тридцатилетней давности — тащи мне. Мой желудок переварит даже свинец.",
                "Знаешь, какая разница между мной и зомби? Я шучу смешнее, а пахнем мы примерно одинаково.",
                "В штабе обещали эвакуацию? Ага, держи карман шире. Вертолеты нынче стоят дороже, чем мы оба.",
                "Утырки на удивление чистоплотные. Вон, кости предыдущего агента обглодали до блеска!"
            ];

            this.mapGrid = Array(GRID_SIZE).fill(null).map(() => Array(GRID_SIZE).fill(0));
            this.walls = this.physics.add.staticGroup();
            
            let bgGraphics = this.add.graphics();
            bgGraphics.fillStyle(0x111111, 1);
            bgGraphics.fillRect(0, 0, worldWidth, worldHeight);

            // База
            const baseStart = Math.floor(GRID_SIZE / 2) - 5;
            const baseSizePx = 10 * TILE_SIZE;
            const baseXPx = baseStart * TILE_SIZE;
            const baseYPx = baseStart * TILE_SIZE;
            
            for(let bx = baseStart - 1; bx < baseStart + 11; bx++) {
                for(let by = baseStart - 1; by < baseStart + 11; by++) {
                    if(this.mapGrid[bx]) this.mapGrid[bx][by] = 2;
                }
            }

            bgGraphics.fillStyle(0x1b4d22, 1);
            bgGraphics.fillRect(baseXPx, baseYPx, baseSizePx, baseSizePx);

            this.baseBarrier = this.add.zone(baseXPx + baseSizePx/2, baseYPx + baseSizePx/2, baseSizePx, baseSizePx);
            this.physics.add.existing(this.baseBarrier, true);

            // Генерация Заброшек
            let roomsBuilt = 0, attempts = 0;
            while (roomsBuilt < 25 && attempts < 300) {
                attempts++;
                let roomW = Phaser.Math.Between(5, 9), roomH = Phaser.Math.Between(5, 9);
                let roomX = Phaser.Math.Between(2, GRID_SIZE - roomW - 2), roomY = Phaser.Math.Between(2, GRID_SIZE - roomH - 2);

                let canPlace = true;
                for (let x = roomX - 1; x <= roomX + roomW; x++) {
                    for (let y = roomY - 1; y <= roomY + roomH; y++) {
                        if (this.mapGrid[x][y] !== 0) { canPlace = false; break; }
                    }
                    if (!canPlace) break;
                }

                if (canPlace) {
                    let wallsList = [];
                    for (let x = roomX; x < roomX + roomW; x++) {
                        for (let y = roomY; y < roomY + roomH; y++) {
                            if (x === roomX || x === roomX + roomW - 1 || y === roomY || y === roomY + roomH - 1) {
                                wallsList.push({x, y});
                            } else { this.mapGrid[x][y] = 3; } // Пол внутри
                        }
                    }

                    Phaser.Utils.Array.Shuffle(wallsList);
                    let door1 = wallsList.pop(), door2 = wallsList.pop();
                    this.mapGrid[door1.x][door1.y] = 0; this.mapGrid[door2.x][door2.y] = 0;

                    wallsList.forEach(pos => {
                        this.mapGrid[pos.x][pos.y] = 1; 
                        let wall = this.add.rectangle(pos.x * TILE_SIZE + TILE_SIZE/2, pos.y * TILE_SIZE + TILE_SIZE/2, TILE_SIZE, TILE_SIZE, 0x5c4033);
                        this.walls.add(wall);
                    });
                    roomsBuilt++;
                }
            }

            // Объекты базы
            this.npc = this.add.rectangle(baseXPx + baseSizePx - 64, baseYPx + baseSizePx/2, 24, 24, 0xffaa00);
            this.dronePad = this.add.rectangle(baseXPx + 64, baseYPx + baseSizePx/2, 40, 40, 0x555555);
            
            this.physics.add.existing(this.npc, true);
            this.physics.add.existing(this.dronePad, true);
            this.add.text(this.npc.x - 20, this.npc.y - 25, 'Упырь', { fontSize: '11px', fill: '#ffaa00' });
            this.add.text(this.dronePad.x - 22, this.dronePad.y - 8, 'ДРОН', { fontSize: '14px', fill: '#00ffff', fontStyle: 'bold' });

            // Игрок
            this.player = this.add.circle(baseXPx + baseSizePx/2, baseYPx + baseSizePx/2, 12, 0xffffff);
            this.physics.add.existing(this.player);
            this.player.body.setCollideWorldBounds(true);
            this.physics.add.collider(this.player, this.walls);

            // Группы
            this.slugsGroup = this.physics.add.group();
            this.intelGroup = this.physics.add.group();
            this.zombiesGroup = this.physics.add.group();
            this.coinsGroup = this.physics.add.group();
            this.chipsGroup = this.physics.add.group();
            this.armorGroup = this.physics.add.group();
            this.bulletsGroup = this.physics.add.group();
            this.questGroup = this.physics.add.group(); // Группа для квестовой руки

            // Спавн обычных слизней
            this.spawnObjectsOnGrid(this.slugsGroup, 25, 0x00ff00, 6);
            
            // Спавн Флешек с охраной и обычных бродячих зомби
            this.spawnIntelAndGuards(10);
            this.spawnWanderingZombies(20);

            // Спавн Квестовой Руки (если квест еще не сдан и руки нет в инвентаре)
            if (!this.playerStats.questHandDelivered && !this.playerStats.hasHand) {
                this.spawnQuestHand();
            }

            // Коллизии
            this.physics.add.collider(this.zombiesGroup, this.walls);
            this.physics.add.collider(this.zombiesGroup, this.baseBarrier);
            this.physics.add.collider(this.bulletsGroup, this.walls, (bullet) => bullet.destroy());

            this.physics.add.overlap(this.player, this.slugsGroup, (p, i) => this.collectItem(i, 'slugs'), null, this);
            this.physics.add.overlap(this.player, this.intelGroup, (p, i) => this.collectItem(i, 'intel'), null, this);
            this.physics.add.overlap(this.player, this.coinsGroup, (p, i) => this.collectItem(i, 'coins'), null, this);
            this.physics.add.overlap(this.player, this.chipsGroup, (p, i) => this.collectItem(i, 'chips'), null, this);
            this.physics.add.overlap(this.player, this.armorGroup, this.collectArmor, null, this);
            this.physics.add.overlap(this.player, this.questGroup, this.collectHand, null, this);

            this.physics.add.overlap(this.player, this.npc, this.interactNPC, null, this);
            this.physics.add.overlap(this.player, this.dronePad, this.callDrone, null, this);
            this.physics.add.overlap(this.player, this.zombiesGroup, this.hitPlayer, null, this);
            this.physics.add.overlap(this.bulletsGroup, this.zombiesGroup, this.shootZombie, null, this);

            // Стрельба
            this.input.on('pointerdown', (pointer) => {
                if (this.playerStats.hasWeapon) {
                    if (this.playerStats.ammo > 0) {
                        this.playerStats.ammo--;
                        this.updateUI();
                        let bullet = this.add.circle(this.player.x, this.player.y, 4, 0xffd700);
                        this.physics.add.existing(bullet);
                        this.bulletsGroup.add(bullet);
                        let angle = Phaser.Math.Angle.Between(this.player.x, this.player.y, pointer.worldX, pointer.worldY);
                        this.physics.velocityFromAngle(Phaser.Math.RadToDeg(angle), 600, bullet.body.velocity);
                    } else if (this.time.now > this.lastDroneAction + 1000) {
                        this.addLogMessage('Система', 'Нет патронов!', '#ff0000');
                        this.lastDroneAction = this.time.now;
                    }
                }
            });

            this.cameras.main.setBounds(0, 0, worldWidth, worldHeight);
            this.cameras.main.startFollow(this.player, true, 0.1, 0.1);
            this.cameras.main.setZoom(1.2);

            this.addLogMessage('Система', 'Высадка прошла успешно. Выполняйте задачу.', '#aaa');
            if (this.playerStats.hasWeapon) document.getElementById('weapon-section').style.display = 'block';
            this.updateUI();

            this.cursors = this.input.keyboard.createCursorKeys();
            this.wasd = this.input.keyboard.addKeys('W,A,S,D');
        }

        addLogMessage(sender, text, color) {
            const logContainer = document.getElementById('log-messages');
            const msgDiv = document.createElement('div');
            msgDiv.style.fontSize = '12px'; msgDiv.style.lineHeight = '1.4';
            msgDiv.innerHTML = `<span style="color:${color}; font-weight:bold;">[${sender}]:</span> <span style="color:#ddd;">${text}</span>`;
            logContainer.appendChild(msgDiv);
            logContainer.scrollTop = logContainer.scrollHeight;
        }

        spawnObjectsOnGrid(group, count, color, size) {
            let spawned = 0, attempts = 0;
            while (spawned < count && attempts < 1500) {
                attempts++;
                let tx = Phaser.Math.Between(1, this.mapGrid.length - 2), ty = Phaser.Math.Between(1, this.mapGrid[0].length - 2);
                if (this.mapGrid[tx][ty] === 0 || this.mapGrid[tx][ty] === 3) {
                    let obj = this.add.circle(tx * 32 + 16, ty * 32 + 16, size, color);
                    group.add(obj);
                    spawned++;
                }
            }
        }

        // Спавн флешек с прикрепленными охранниками
        spawnIntelAndGuards(count) {
            let spawned = 0, attempts = 0;
            while (spawned < count && attempts < 1500) {
                attempts++;
                let tx = Phaser.Math.Between(1, this.mapGrid.length - 2), ty = Phaser.Math.Between(1, this.mapGrid[0].length - 2);
                if (this.mapGrid[tx][ty] === 0 || this.mapGrid[tx][ty] === 3) {
                    let intelX = tx * 32 + 16;
                    let intelY = ty * 32 + 16;
                    
                    let intel = this.add.circle(intelX, intelY, 6, 0x0000ff);
                    this.intelGroup.add(intel);
                    
                    // Спавним 2-3 охранников вокруг этой флешки
                    let guardCount = Phaser.Math.Between(2, 3);
                    for(let i=0; i<guardCount; i++) {
                        // Позиция спавна охранника (немного сдвинута от флешки)
                        let ox = intelX + Phaser.Math.Between(-20, 20);
                        let oy = intelY + Phaser.Math.Between(-20, 20);
                        let guard = this.add.circle(ox, oy, 10, 0xff0000);
                        this.physics.add.existing(guard);
                        guard.body.setCollideWorldBounds(true);
                        guard.body.setBounce(1);
                        guard.hp = Phaser.Math.Between(2, 4);
                        
                        // Специальные свойства для патрулирования
                        guard.isGuard = true;
                        guard.guardX = intelX;
                        guard.guardY = intelY;
                        this.zombiesGroup.add(guard);
                    }
                    spawned++;
                }
            }
        }

        // Спавн обычных бродячих зомби
        spawnWanderingZombies(count) {
            let spawned = 0, attempts = 0;
            while (spawned < count && attempts < 1500) {
                attempts++;
                let tx = Phaser.Math.Between(1, this.mapGrid.length - 2), ty = Phaser.Math.Between(1, this.mapGrid[0].length - 2);
                if (this.mapGrid[tx][ty] === 0 || this.mapGrid[tx][ty] === 3) {
                    let zombie = this.add.circle(tx * 32 + 16, ty * 32 + 16, 10, 0xff0000);
                    this.physics.add.existing(zombie);
                    zombie.body.setCollideWorldBounds(true);
                    zombie.body.setBounce(1);
                    zombie.hp = Phaser.Math.Between(2, 4);
                    zombie.isGuard = false;
                    this.zombiesGroup.add(zombie);
                    spawned++;
                }
            }
        }

        // Спавн квестовой руки внутри одной из комнат
        spawnQuestHand() {
            let spawned = false, attempts = 0;
            while (!spawned && attempts < 1500) {
                attempts++;
                let tx = Phaser.Math.Between(1, this.mapGrid.length - 2), ty = Phaser.Math.Between(1, this.mapGrid[0].length - 2);
                // Ищем только пол внутри комнат (3), чтобы рука была спрятана
                if (this.mapGrid[tx][ty] === 3) {
                    let hand = this.add.circle(tx * 32 + 16, ty * 32 + 16, 8, 0xa020f0); // Фиолетовый
                    this.questGroup.add(hand);
                    spawned = true;
                }
            }
        }

        collectItem(item, type) {
            item.destroy();
            this.playerStats[type]++;
            this.updateUI();
        }

        collectArmor(player, armorItem) {
            if (this.playerStats.armor < 5) {
                armorItem.destroy();
                this.playerStats.armor++;
                this.updateUI();
            }
        }

        collectHand(player, hand) {
            hand.destroy();
            this.playerStats.hasHand = true;
            this.addLogMessage('Система', 'Найдена оторванная рука. Кажется, она принадлежит Упырю.', '#a020f0');
            this.updateUI();
        }

        interactNPC() {
            // Если принесли руку
            if (this.playerStats.hasHand) {
                this.playerStats.hasHand = false;
                this.playerStats.questHandDelivered = true;
                this.addLogMessage('Упырь', 'МОЯ РУКА! Я думал, её сожрали! Держи царский подгон из заначки!', '#a020f0');
                
                // Раскидываем 15 единиц случайного мощного лута
                for(let i=0; i<15; i++) {
                    let rand = Phaser.Math.Between(1, 100);
                    if (rand <= 40) this.spawnObjectsOnGrid(this.coinsGroup, 1, 0xffd700, 5); 
                    else if (rand <= 70) this.spawnObjectsOnGrid(this.chipsGroup, 1, 0x00ffff, 6); 
                    else this.spawnObjectsOnGrid(this.armorGroup, 1, 0xc0c0c0, 6); 
                }
                this.updateUI();
                this.lastNpcTalkTime = this.time.now;
                return; // Выходим, чтобы не смешивать с обычным обменом
            }

            // Обычный обмен слизней
            if (this.playerStats.slugs > 0) {
                let amountToSpawn = this.playerStats.slugs * 3;
                for(let i=0; i<amountToSpawn; i++) {
                    let rand = Phaser.Math.Between(1, 100);
                    if (rand <= 50) this.spawnObjectsOnGrid(this.coinsGroup, 1, 0xffd700, 5);
                    else if (rand <= 80) this.spawnObjectsOnGrid(this.chipsGroup, 1, 0x00ffff, 6);
                    else this.spawnObjectsOnGrid(this.armorGroup, 1, 0xc0c0c0, 6);
                }
                this.addLogMessage('Упырь', `Держи ништяки, Агент! Раскидал по округе.`, '#ffaa00');
                this.playerStats.npcSlugs += this.playerStats.slugs;
                this.playerStats.slugs = 0;
                this.updateUI();
                this.lastNpcTalkTime = this.time.now;
            }
        }

        buyMedkit() {
            if (this.playerStats.coins >= 10) {
                if (this.playerStats.lives < 3) {
                    this.playerStats.coins -= 10;
                    this.playerStats.lives++;
                    this.addLogMessage('СИСТЕМА', 'Куплена аптечка. Здоровье +1.', '#00ff00');
                    this.updateUI();
                } else {
                    this.addLogMessage('СИСТЕМА', 'Здоровье уже на максимуме!', '#aaa');
                }
            } else {
                this.addLogMessage('СИСТЕМА', 'Не хватает монет (нужно 10).', '#ff0000');
            }
        }

        callDrone() {
            if (this.time.now < this.lastDroneAction + 1500) return;

            if (!this.playerStats.hasWeapon) {
                if (this.playerStats.chips >= 5) {
                    this.playerStats.chips -= 5;
                    this.playerStats.hasWeapon = true;
                    this.playerStats.ammo += 20;
                    document.getElementById('weapon-section').style.display = 'block';
                    this.addLogMessage('ДРОН', 'Пистолет и 20 патронов доставлены.', '#00ffff');
                    this.updateUI();
                } else {
                    this.addLogMessage('ДРОН', 'Отказ. Требуется 5 микросхем для оружия.', '#555');
                }
            } else {
                if (this.playerStats.chips >= 2) {
                    this.playerStats.chips -= 2;
                    this.playerStats.ammo += 20;
                    this.addLogMessage('ДРОН', '+20 патронов.', '#00ffff');
                    this.updateUI();
                } else {
                    this.addLogMessage('ДРОН', 'Отказ. Требуется 2 микросхемы для патронов.', '#555');
                }
            }
            this.lastDroneAction = this.time.now;
        }

        shootZombie(bullet, zombie) {
            bullet.destroy();
            zombie.hp--;
            zombie.setFillStyle(0xffffff);
            this.time.delayedCall(100, () => zombie.setFillStyle(0xff0000));

            if (zombie.hp <= 0) {
                let zx = zombie.x; let zy = zombie.y;
                zombie.destroy();
                
                // Дроп с убитого: 100% слизень, 30% монетка
                let slug = this.add.circle(zx, zy, 6, 0x00ff00);
                this.slugsGroup.add(slug);
                if (Phaser.Math.Between(1, 100) <= 30) {
                    // Монетка немного отлетает в сторону
                    let coin = this.add.circle(zx + Phaser.Math.Between(-10, 10), zy + Phaser.Math.Between(-10, 10), 5, 0xffd700);
                    this.coinsGroup.add(coin);
                }
            }
        }

        hitPlayer(player, zombie) {
            if (this.isInvulnerable) return;

            if (this.playerStats.armor > 0) {
                this.playerStats.armor--;
                this.addLogMessage('ВНИМАНИЕ', 'Броня поглотила урон!', '#c0c0c0');
            } else {
                this.playerStats.lives--;
                this.addLogMessage('ВНИМАНИЕ', 'Получен урон здоровью!', '#ff0000');
            }
            this.updateUI();

            if (this.playerStats.lives <= 0) {
                this.addLogMessage('СИСТЕМА', 'Агент эвакуирован. Часть лута утеряна.', '#ff0000');
                this.playerStats.lives = 3;
                this.playerStats.armor = 0;
                this.playerStats.slugs = 0;
                
                this.player.x = 30 * 32;
                this.player.y = 30 * 32;
                this.updateUI();
            } else {
                this.isInvulnerable = true;
                this.tweens.add({
                    targets: this.player, alpha: 0.2, duration: 100, yoyo: true, repeat: 5,
                    onComplete: () => { this.player.alpha = 1; this.isInvulnerable = false; }
                });
            }
        }

        finishMission() {
            if (this.playerStats.intel >= 10) {
                this.playerStats.intel -= 10;
                this.addLogMessage('ШТАБ', 'Данные приняты. Опергруппа выслана. Подготовка переброски на новую карту...', '#00ff00');
                
                // Перезапуск сцены с передачей текущего инвентаря
                this.time.delayedCall(2000, () => {
                    document.getElementById('log-messages').innerHTML = ''; // Очистка лога
                    this.scene.restart({ playerStats: this.playerStats });
                });
            }
        }

        updateUI() {
            document.getElementById('ui-lives').innerText = `${this.playerStats.lives} / 3`;
            document.getElementById('ui-armor').innerText = `${this.playerStats.armor} / 5`;
            document.getElementById('ui-slugs').innerText = this.playerStats.slugs;
            document.getElementById('ui-coins').innerText = this.playerStats.coins;
            document.getElementById('ui-chips').innerText = this.playerStats.chips;
            document.getElementById('ui-intel').innerText = `${this.playerStats.intel} / 10`;
            document.getElementById('ui-ammo').innerText = this.playerStats.ammo;
            
            document.getElementById('ui-hand').innerText = this.playerStats.questHandDelivered ? "Отдана" : (this.playerStats.hasHand ? "Найдена" : "Нет");
            document.getElementById('ui-hand').style.color = (this.playerStats.hasHand || this.playerStats.questHandDelivered) ? "#00ff00" : "#a020f0";

            // Кнопка завершения миссии
            let btnFinish = document.getElementById('btn-finish');
            if (this.playerStats.intel >= 10) {
                btnFinish.style.display = 'block';
            } else {
                btnFinish.style.display = 'none';
            }
        }

        update() {
            const playerSpeed = 220;
            this.player.body.setVelocity(0);

            if (this.cursors.left.isDown || this.wasd.A.isDown) this.player.body.setVelocityX(-playerSpeed);
            else if (this.cursors.right.isDown || this.wasd.D.isDown) this.player.body.setVelocityX(playerSpeed);

            if (this.cursors.up.isDown || this.wasd.W.isDown) this.player.body.setVelocityY(-playerSpeed);
            else if (this.cursors.down.isDown || this.wasd.S.isDown) this.player.body.setVelocityY(playerSpeed);

            // Шутки Упыря
            let distToNpc = Phaser.Math.Distance.Between(this.player.x, this.player.y, this.npc.x, this.npc.y);
            if (!this.playerStats.hasHand && distToNpc < 120 && this.time.now > this.lastNpcTalkTime + 12000) {
                let joke = Phaser.Utils.Array.GetRandom(this.npcJokes);
                if (!this.playerStats.questHandDelivered && Phaser.Math.Between(1, 3) === 1) {
                    joke = "Ты не видел мою левую руку? Кажется, тот утырок унес ее в сторону заброшек.";
                }
                this.addLogMessage('Упырь', joke, '#ffaa00');
                this.lastNpcTalkTime = this.time.now;
            }

            // Умная логика Зомби (Патруль и Брождение)
            const zombieSpeed = 40; 
            this.zombiesGroup.children.iterate(zombie => {
                if (zombie.isGuard) {
                    // Логика охранника
                    let distToGuardPoint = Phaser.Math.Distance.Between(zombie.x, zombie.y, zombie.guardX, zombie.guardY);
                    if (distToGuardPoint > 80) {
                        // Если отошел слишком далеко от своей флешки - возвращается
                        this.physics.moveTo(zombie, zombie.guardX, zombie.guardY, zombieSpeed);
                    } else if (Math.abs(zombie.body.velocity.x) < 5 && Math.abs(zombie.body.velocity.y) < 5 || Phaser.Math.Between(0, 80) === 0) {
                        // Хаотично бродит вокруг флешки
                        let angle = Phaser.Math.Between(0, 360);
                        this.physics.velocityFromAngle(angle, zombieSpeed, zombie.body.velocity);
                    }
                } else {
                    // Логика обычного бродяги
                    if (Math.abs(zombie.body.velocity.x) < 5 && Math.abs(zombie.body.velocity.y) < 5) {
                        let angle = Phaser.Math.Between(0, 360);
                        this.physics.velocityFromAngle(angle, zombieSpeed, zombie.body.velocity);
                    } else if (Phaser.Math.Between(0, 100) === 0) {
                        let angle = Phaser.Math.Between(0, 360);
                        this.physics.velocityFromAngle(angle, zombieSpeed, zombie.body.velocity);
                    }
                }
            });
        }
    }

    const config = {
        type: Phaser.AUTO, width: 800, height: 600, parent: 'game-container',
        physics: { default: 'arcade', arcade: { debug: false } },
        scene: [GameScene]
    };

    const game = new Phaser.Game(config);
</script>

</body>
</html>
