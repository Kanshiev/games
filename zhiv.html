<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Wasteland Agent: Procedural Engine</title>
    <style>
        body { margin: 0; background: #050505; color: #00ff00; font-family: monospace; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
        canvas { border: 2px solid #222; box-shadow: 0 0 30px rgba(0,255,0,0.1); }
        #info { margin-top: 10px; font-size: 14px; text-align: center; }
    </style>
</head>
<body>

    <canvas id="gameCanvas" width="800" height="600"></canvas>
    <div id="info">Нажми <b>ПРОБЕЛ</b>, чтобы перегенерировать мир заново. <br>Зеленый — База, Серый — дороги/пустыри, Коричневый — стены заброшек.</div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

// Размеры сетки мира
const GRID_SIZE = 60; // Карта 60х60 тайлов
const TILE_SIZE = 32; // Каждый тайл 32х32 пикселя

// Типы тайлов
const TILE = {
    EMPTY: 0,   // Пустырь / земля
    WALL: 1,    // Стена заброшки
    BASE: 2,    // Территория базы
    ROAD: 3     // Дорога / улочка
};

let worldMap = [];

// 1. Алгоритм процедурной генерации
function generateWorld() {
    worldMap = Array(GRID_SIZE).fill(null).map(() => Array(GRID_SIZE).fill(TILE.EMPTY));
    
    // Создаем безопасную базу строго в центре (размер 10х10 тайлов)
    const baseStart = Math.floor(GRID_SIZE / 2) - 5;
    for (let x = baseStart; x < baseStart + 10; x++) {
        for (let y = baseStart; y < baseStart + 10; y++) {
            worldMap[x][y] = TILE.BASE;
        }
    }

    // Генерируем заброшенные дома (случайные комнаты за пределами базы)
    const roomCount = 15 + Math.floor(Math.random() * 10); // 15-25 домов
    for (let i = 0; i < roomCount; i++) {
        let roomW = 4 + Math.floor(Math.random() * 6); // ширина 4-10
        let roomH = 4 + Math.floor(Math.random() * 6); // высота 4-10
        let roomX = Math.floor(Math.random() * (GRID_SIZE - roomW - 2)) + 1;
        let roomY = Math.floor(Math.random() * (GRID_SIZE - roomH - 2)) + 1;

        // Проверяем, чтобы дом не залез на базу
        let overlapsBase = false;
        for (let x = roomX - 1; x < roomX + roomW + 1; x++) {
            for (let y = roomY - 1; y < roomY + roomH + 1; y++) {
                if (worldMap[x] && worldMap[x][y] === TILE.BASE) overlapsBase = true;
            }
        }

        // Если место свободно, строим коробку дома (стены по периметру, пустота внутри)
        if (!overlapsBase) {
            for (let x = roomX; x < roomX + roomW; x++) {
                for (let y = roomY; y < roomY + roomH; y++) {
                    if (x === roomX || x === roomX + roomW - 1 || y === roomY || y === roomY + roomH - 1) {
                        worldMap[x][y] = TILE.WALL; // Стены
                    }
                }
            }
            
            // Пробиваем случайную дверь в стене
            let doorX = roomX + Math.floor(Math.random() * (roomW - 2)) + 1;
            worldMap[doorX][roomY] = TILE.EMPTY; 
        }
    }

    // Прокладываем пару случайных улочек-линий
    for (let k = 0; k < 4; k++) {
        let startX = Math.floor(Math.random() * GRID_SIZE);
        for (let y = 0; y < GRID_SIZE; y++) {
            if (worldMap[startX][y] === TILE.EMPTY) worldMap[startX][y] = TILE.ROAD;
        }
    }
}

// 2. Отрисовка карты (Камера зафиксирована по центру для демонстрации)
function drawWorld() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    
    // Центрируем сетку на экране
    const offsetX = (canvas.width - GRID_SIZE * TILE_SIZE) / 2;
    const offsetY = (canvas.height - GRID_SIZE * TILE_SIZE) / 2;

    for (let x = 0; x < GRID_SIZE; x++) {
        for (let y = 0; y < GRID_SIZE; y++) {
            let tile = worldMap[x][y];
            
            if (tile === TILE.BASE) ctx.fillStyle = '#1b4d22'; // База
            else if (tile === TILE.WALL) ctx.fillStyle = '#5c4033'; // Стены заброшек
            else if (tile === TILE.ROAD) ctx.fillStyle = '#333333'; // Улочки
            else ctx.fillStyle = '#111111'; // Пустыри

            ctx.fillRect(offsetX + x * TILE_SIZE, offsetY + y * TILE_SIZE, TILE_SIZE - 1, TILE_SIZE - 1);
        }
    }
}

// Запуск и управление
generateWorld();
drawWorld();

window.addEventListener('keydown', (e) => {
    if (e.code === 'Space') {
        generateWorld();
        drawWorld();
    }
});
</script>
</body>
</html>
