<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Wasteland Agent: Phaser Edition</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
    <style>
        body {
            margin: 0;
            background-color: #050505;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }
        #game-container {
            border: 3px solid #222;
            box-shadow: 0 0 30px rgba(0, 255, 0, 0.1);
        }
    </style>
</head>
<body>

<div id="game-container"></div>

<script>
    // 1. Главный класс сцены игры
    class GameScene extends Phaser.Scene {
        constructor() {
            super('GameScene');
        }

        preload() {
            // Здесь в будущем мы будем загружать спрайтшиты и звуки
        }

        create() {
            const GRID_SIZE = 60;  // Размер карты в тайлах
            const TILE_SIZE = 32;  // Размер одного тайла в пикселях
            const worldWidth = GRID_SIZE * TILE_SIZE;
            const worldHeight = GRID_SIZE * TILE_SIZE;

            // Настраиваем границы физического мира
            this.physics.world.setBounds(0, 0, worldWidth, worldHeight);

            // Создаем статическую группу для стен заброшек (чтобы они были твердыми)
            this.walls = this.physics.add.staticGroup();

            // Отрисовка земли и базы через Graphics (оптимально для генерации пола)
            let bgGraphics = this.add.graphics();
            
            // Заливаем всю карту темно-серым (пустырь)
            bgGraphics.fillStyle(0x111111, 1);
            bgGraphics.fillRect(0, 0, worldWidth, worldHeight);

            // Определяем центр для базы
            const baseStart = Math.floor(GRID_SIZE / 2) - 5;
            
            // Заливаем зону базы зеленым
            bgGraphics.fillStyle(0x1b4d22, 1);
            bgGraphics.fillRect(baseStart * TILE_SIZE, baseStart * TILE_SIZE, 10 * TILE_SIZE, 10 * TILE_SIZE);

            // Алгоритм процедурной генерации домов вокруг базы
            for (let i = 0; i < 20; i++) {
                let roomW = Phaser.Math.Between(5, 9);
                let roomH = Phaser.Math.Between(5, 9);
                let roomX = Phaser.Math.Between(1, GRID_SIZE - roomW - 2);
                let roomY = Phaser.Math.Between(1, GRID_SIZE - roomH - 2);

                // Защита базы: если дом лезет на базу, отменяем его постройку
                if (roomX + roomW > baseStart - 2 && roomX < baseStart + 12 &&
                    roomY + roomH > baseStart - 2 && roomY < baseStart + 12) {
                    continue;
                }

                // Строим коробку заброшки
                for (let x = roomX; x < roomX + roomW; x++) {
                    for (let y = roomY; y < roomY + roomH; y++) {
                        if (x === roomX || x === roomX + roomW - 1 || y === roomY || y === roomY + roomH - 1) {
                            
                            // Делаем случайные дыры в стенах (двери/проломы), чтобы можно было зайти
                            if (Phaser.Math.Between(0, 8) === 0) continue;

                            let wallX = x * TILE_SIZE + TILE_SIZE / 2;
                            let wallY = y * TILE_SIZE + TILE_SIZE / 2;

                            // Создаем физический объект стены (коричневый квадрат)
                            let wall = this.add.rectangle(wallX, wallY, TILE_SIZE, TILE_SIZE, 0x5c4033);
                            this.walls.add(wall);
                        }
                    }
                }
            }

            // Спавним Агента строго в центре базы
            let playerSpawnX = (baseStart + 5) * TILE_SIZE;
            let playerSpawnY = (baseStart + 5) * TILE_SIZE;

            // Агент пока представлен белым кругом (в будущем заменим на спрайт)
            this.player = this.add.circle(playerSpawnX, playerSpawnY, 12, 0xffffff);
            
            // Включаем физику для игрока
            this.physics.add.existing(this.player);
            this.player.body.setCollideWorldBounds(true);

            // Включаем коллизию между Агентом и стенами заброшек
            this.physics.add.collider(this.player, this.walls);

            // Настройка камеры (настоящий Diablo-стайл)
            this.cameras.main.setBounds(0, 0, worldWidth, worldHeight);
            this.cameras.main.startFollow(this.player, true, 0.1, 0.1);
            this.cameras.main.setZoom(1.2); // Немного приблизим для атмосферы

            // Инициализация управления (стрелочки + WASD)
            this.cursors = this.input.keyboard.createCursorKeys();
            this.wasd = this.input.keyboard.addKeys('W,A,S,D');
        }

        update() {
            const speed = 220;
            // Сбрасываем скорость перед каждым кадром
            this.player.body.setVelocity(0);

            // Движение по оси X
            if (this.cursors.left.isDown || this.wasd.A.isDown) {
                this.player.body.setVelocityX(-speed);
            } else if (this.cursors.right.isDown || this.wasd.D.isDown) {
                this.player.body.setVelocityX(speed);
            }

            // Движение по оси Y
            if (this.cursors.up.isDown || this.wasd.W.isDown) {
                this.player.body.setVelocityY(-speed);
            } else if (this.cursors.down.isDown || this.wasd.S.isDown) {
                this.player.body.setVelocityY(speed);
            }

            // Нормализация скорости при движении по диагонали Phaser делает автоматически при использовании векторов,
            // но для простого прототипа этого базового метода сейчас более чем достаточно.
        }
    }

    // 2. Конфигурация самого движка Phaser
    const config = {
        type: Phaser.AUTO,
        width: 800,
        height: 600,
        parent: 'game-container',
        physics: {
            default: 'arcade',
            arcade: {
                debug: false // Поставь true, если захочешь увидеть сетку физических границ
            }
        },
        scene: [GameScene]
    };

    // Запуск игры
    const game = new Phaser.Game(config);
</script>

</body>
</html>
