<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Постапокалипсис: Агент на задании</title>
    <style>
        body {
            margin: 0;
            background-color: #111;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: 'Courier New', Courier, monospace; /* Военный стиль шрифта */
        }
        canvas {
            border: 4px solid #444;
            box-shadow: 0 0 30px rgba(0,0,0,0.9);
        }
    </style>
</head>
<body>

    <canvas id="gameCanvas" width="800" height="600"></canvas>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');

    // Размеры ОГРОМНОГО мира (в пикселях)
    const world = {
        width: 3000,
        height: 3000
    };

    // Настройки Агента (теперь он спавнится в самом центре мира)
    const player = {
        x: world.width / 2,
        y: world.height / 2,
        size: 18,
        speed: 5,
        color: '#00ffcc'
    };

    // Настройки Камеры (следит за игроком)
    const camera = {
        x: 0,
        y: 0
    };

    // Военная база (прямо по центру мира)
    const base = {
        x: world.width / 2 - 250,
        y: world.height / 2 - 250,
        width: 500,
        height: 500
    };

    // Наш NPC Полуобморок
    const npc = {
        x: world.width / 2 + 100, // Стоит чуть правее центра базы
        y: world.height / 2 + 50,
        size: 16,
        color: '#889955', // Такой... полугнилой зеленоватый цвет
        phrase: "Если тебя сожрут, можно мне твои берцы? Мои пальцы уже отваливаются...",
        showText: false
    };

    const keys = {};

    window.addEventListener('keydown', (e) => keys[e.code] = true);
    window.addEventListener('keyup', (e) => keys[e.code] = false);

    function gameLoop() {
        update();
        render();
        requestAnimationFrame(gameLoop);
    }

    function update() {
        // Движение игрока
        if (keys['KeyW'] || keys['ArrowUp']) player.y -= player.speed;
        if (keys['KeyS'] || keys['ArrowDown']) player.y += player.speed;
        if (keys['KeyA'] || keys['ArrowLeft']) player.x -= player.speed;
        if (keys['KeyD'] || keys['ArrowRight']) player.x += player.speed;

        // Ограничиваем Агента границами ВСЕГО МИРА (а не экрана)
        if (player.x < player.size) player.x = player.size;
        if (player.x > world.width - player.size) player.x = world.width - player.size;
        if (player.y < player.size) player.y = player.size;
        if (player.y > world.height - player.size) player.y = world.height - player.size;

        // ЦЕНТРИРУЕМ КАМЕРУ НА ИГРОКЕ
        camera.x = player.x - canvas.width / 2;
        camera.y = player.y - canvas.height / 2;

        // Не даем камере выходить за края карты
        if (camera.x < 0) camera.x = 0;
        if (camera.y < 0) camera.y = 0;
        if (camera.x > world.width - canvas.width) camera.x = world.width - canvas.width;
        if (camera.y > world.height - canvas.height) camera.y = world.height - canvas.height;

        // ПРОВЕРКА: Близко ли игрок к Полуобмороку?
        let dx = player.x - npc.x;
        let dy = player.y - npc.y;
        let distance = Math.sqrt(dx * dx + dy * dy);

        // Если подошли ближе чем на 100 пикселей — он заговаривает
        if (distance < 100) {
            npc.showText = true;
        } else {
            npc.showText = false;
        }
    }

    function render() {
        // Заливаем фон (чернота за пределами карты)
        ctx.fillStyle = '#050505';
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        // Сдвигаем холст под координаты камеры
        ctx.save();
        ctx.translate(-camera.x, -camera.y);

        // --- ВСЁ, ЧТО РИСУЕТСЯ НИЖЕ, СУЩЕСТВУЕТ В КООРДИНАТАХ БОЛЬШОГО МИРА ---

        // Выжженная земля (карта 3000х3000)
        ctx.fillStyle = '#1a1a1a';
        ctx.fillRect(0, 0, world.width, world.height);

        // Сетка мира (шаг 100 пикселей)
        ctx.strokeStyle = '#252525';
        ctx.lineWidth = 1;
        for (let x = 0; x <= world.width; x += 100) {
            ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, world.height); ctx.stroke();
        }
