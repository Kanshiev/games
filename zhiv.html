<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Wasteland Agent: HTML UI</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
    <style>
        body { 
            margin: 0; 
            background-color: #050505; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            overflow: hidden; 
            font-family: 'Courier New', Courier, monospace;
            color: #00ff00;
        }
        
        /* Боковая панель интерфейса */
        #ui-panel {
            width: 260px;
            height: 600px; /* Высота совпадает с высотой игры */
            background-color: #0a0a0a;
            border: 3px solid #222;
            margin-right: 20px;
            padding: 20px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            gap: 20px;
            box-shadow: 0 0 15px rgba(0, 255, 0, 0.05);
        }

        .ui-section { border-bottom: 1px dashed #333; padding-bottom: 15px; }
        .ui-section:last-child { border-bottom: none; }
        h3 { margin: 0 0 10px 0; color: #777; font-size: 16px; letter-spacing: 1px; }
        .stat-row { margin-bottom: 8px; font-size: 15px; }
        .val { font-weight: bold; color: #fff; }
        .val-orange { font-weight: bold; color: #ffa500; }
        .val-blue { font-weight: bold; color: #00aaff; }

        #game-container { 
            border: 3px solid #222; 
            box-shadow: 0 0 20px rgba(0,255,0,0.1); 
        }
    </style>
</head>
<body>

<!-- HTML Интерфейс вынесен за пределы канваса -->
<div id="ui-panel">
    <div class="ui-section">
        <h3>АГЕНТ</h3>
        <div class="stat-row">ЖИЗНИ: <span id="ui-lives" class="val">3</span> / 3</div>
    </div>
    <div class="ui-section">
        <h3>ИНВЕНТАРЬ</h3>
        <div class="stat-row">Слизней: <span id="ui-slugs" class="val">0</span></div>
        <div class="stat-row">Флешек: <span id="ui-intel" class="val">0</span></div>
        <div class="stat-row">Лута: <span id="ui-loot" class="val">0</span></div>
    </div>
    <div class="ui-section">
        <h3>БАЗА</h3>
        <div class="stat-row">Данные (синий ящик): <span id="ui-chest-intel" class="val-blue">0</span></div>
        <div class="stat-row">Лут (оранжевый ящик): <span id="ui-chest-loot" class="val-orange">0</span></div>
        <div class="stat-row" style="margin-top: 15px; color: #ffaa00;">Отдано Упырю: <span id="ui-npc-slugs" class="val">0</span></div>
    </div>
</div>

<div id="game-container"></div>

<script>
    class GameScene extends Phaser.Scene {
        constructor() {
            super('GameScene');
        }

        create() {
            const GRID_SIZE = 60;
            const TILE_SIZE = 32;
            const worldWidth = GRID_SIZE * TILE_SIZE;
            const worldHeight = GRID_SIZE * TILE_SIZE;

            this.physics.world.setBounds(0, 0, worldWidth, worldHeight);

            this.playerStats = {
                lives: 3,
                slugs: 0,
                intel: 0,
                generalLoot: 0,
                chestIntel: 0,
                chestLoot: 0,
                npcSlugs: 0
            };
            this.isInvulnerable = false;

            this.mapGrid = Array(GRID_SIZE).fill(null).map(() => Array(GRID_SIZE).fill(0));

            this.walls = this.physics.add.staticGroup();
            let bgGraphics = this.add.graphics();
            bgGraphics.fillStyle(0x111111, 1);
            bgGraphics.fillRect(0, 0, worldWidth, worldHeight);

            // База
            const baseStart = Math.floor(GRID_SIZE / 2) - 5;
            const baseSizePx = 10 * TILE_SIZE;
            const baseXPx = baseStart * TILE_SIZE;
            const baseYPx = baseStart * TILE_SIZE;
            
            for(let bx = baseStart - 1; bx < baseStart + 11; bx++) {
                for(let by = baseStart - 1; by < baseStart + 11; by++) {
                    if(this.mapGrid[bx] !== undefined) this.mapGrid[bx][by] = 2;
                }
            }

            bgGraphics.fillStyle(0x1b4d22, 1);
            bgGraphics.fillRect(baseXPx, baseYPx, baseSizePx, baseSizePx);

            this.baseBarrier = this.add.zone(baseXPx + baseSizePx/2, baseYPx + baseSizePx/2, baseSizePx, baseSizePx);
            this.physics.add.existing(this.baseBarrier, true);

            // Заброшки
            let roomsBuilt = 0;
            let attempts = 0;
            
            while (roomsBuilt < 25 && attempts < 300) {
                attempts++;
                let roomW = Phaser.Math.Between(5, 9);
                let roomH = Phaser.Math.Between(5, 9);
                let roomX = Phaser.Math.Between(2, GRID_SIZE - roomW - 2);
                let roomY = Phaser.Math.Between(2, GRID_SIZE - roomH - 2);

                let canPlace = true;
                for (let x = roomX - 1; x <= roomX + roomW; x++) {
                    for (let y = roomY - 1; y <= roomY + roomH; y++) {
                        if (this.mapGrid[x][y] !== 0) { 
                            canPlace = false;
                            break;
                        }
                    }
                    if (!canPlace) break;
                }

                if (canPlace) {
                    let wallsList = [];
                    for (let x = roomX; x < roomX + roomW; x++) {
                        for (let y = roomY; y < roomY + roomH; y++) {
                            if (x === roomX || x === roomX + roomW - 1 || y === roomY || y === roomY + roomH - 1) {
                                wallsList.push({x, y});
                            } else {
                                this.mapGrid[x][y] = 3; 
                            }
                        }
                    }

                    Phaser.Utils.Array.Shuffle(wallsList);
                    let door1 = wallsList.pop();
                    let door2 = wallsList.pop();
                    this.mapGrid[door1.x][door1.y] = 0; 
                    this.mapGrid[door2.x][door2.y] = 0;

                    wallsList.forEach(pos => {
                        this.mapGrid[pos.x][pos.y] = 1; 
                        let wall = this.add.rectangle(pos.x * TILE_SIZE + TILE_SIZE/2, pos.y * TILE_SIZE + TILE_SIZE/2, TILE_SIZE, TILE_SIZE, 0x5c4033);
                        this.walls.add(wall);
                    });
                    roomsBuilt++;
                }
            }

            // Объекты базы
            this.intelChest = this.add.rectangle(baseXPx + 64, baseYPx + 64, 24, 24, 0x00aaff);
            this.lootChest = this.add.rectangle(baseXPx + 64, baseYPx + baseSizePx - 64, 24, 24, 0xffa500);
            this.npc = this.add.rectangle(baseXPx + baseSizePx - 64, baseYPx + baseSizePx/2, 24, 24, 0xffaa00);

            this.physics.add.existing(this.intelChest, true);
            this.physics.add.existing(this.lootChest, true);
            this.physics.add.existing(this.npc, true);

            this.add.text(this.intelChest.x - 25, this.intelChest.y - 25, 'Флешки', { fontSize: '11px', fill: '#00aaff' });
            this.add.text(this.lootChest.x - 15, this.lootChest.y - 25, 'Лут', { fontSize: '11px', fill: '#ffa500' });
            this.add.text(this.npc.x - 20, this.npc.y - 25, 'Упырь', { fontSize: '11px', fill: '#ffaa00' });

            // Игрок
            this.player = this.add.circle(baseXPx + baseSizePx/2, baseYPx + baseSizePx/2, 12, 0xffffff);
            this.physics.add.existing(this.player);
            this.player.body.setCollideWorldBounds(true);
            this.physics.add.collider(this.player, this.walls);

            // Группы
            this.slugsGroup = this.physics.add.group();
            this.intelGroup = this.physics.add.group();
            this.genLootGroup = this.physics.add.group();
            this.heartsGroup = this.physics.add.group();
            this.zombiesGroup = this.physics.add.group();

            this.spawnObjectsOnGrid(this.slugsGroup, 25, 0x00ff00, 6);
            this.spawnObjectsOnGrid(this.intelGroup, 10, 0x0000ff, 6);
            this.spawnObjectsOnGrid(this.heartsGroup, 5, 0xff0055, 8);
            this.spawnObjectsOnGrid(this.zombiesGroup, 30, 0xff0000, 10, true);

            // Коллизии
            this.physics.add.collider(this.zombiesGroup, this.walls);
            this.physics.add.collider(this.zombiesGroup, this.baseBarrier);

            this.physics.add.overlap(this.player, this.slugsGroup, (p, item) => this.collectItem(item, 'slugs'), null, this);
            this.physics.add.overlap(this.player, this.intelGroup, (p, item) => this.collectItem(item, 'intel'), null, this);
            this.physics.add.overlap(this.player, this.genLootGroup, (p, item) => this.collectItem(item, 'generalLoot'), null, this);
            this.physics.add.overlap(this.player, this.heartsGroup, this.collectHeart, null, this);

            this.physics.add.overlap(this.player, this.intelChest, this.depositIntel, null, this);
            this.physics.add.overlap(this.player, this.lootChest, this.depositLoot, null, this);
            this.physics.add.overlap(this.player, this.npc, this.exchangeSlugs, null, this);

            this.physics.add.overlap(this.player, this.zombiesGroup, this.hitPlayer, null, this);

            // Камера
            this.cameras.main.setBounds(0, 0, worldWidth, worldHeight);
            this.cameras.main.startFollow(this.player, true, 0.1, 0.1);
            this.cameras.main.setZoom(1.2);

            this.updateUI();

            this.cursors = this.input.keyboard.createCursorKeys();
            this.wasd = this.input.keyboard.addKeys('W,A,S,D');
        }

        spawnObjectsOnGrid(group, count, color, size, isZombie = false) {
            let spawned = 0;
            let attempts = 0;
            while (spawned < count && attempts < 1500) {
                attempts++;
                let tx = Phaser.Math.Between(1, this.mapGrid.length - 2);
                let ty = Phaser.Math.Between(1, this.mapGrid[0].length - 2);
                
                if (this.mapGrid[tx][ty] === 0 || this.mapGrid[tx][ty] === 3) {
                    let actualColor = Array.isArray(color) ? Phaser.Utils.Array.GetRandom(color) : color;
                    let obj = this.add.circle(tx * 32 + 16, ty * 32 + 16, size, actualColor);
                    group.add(obj);
                    if (isZombie) {
                        obj.body.setCollideWorldBounds(true);
                        obj.body.setBounce(1);
                    }
                    spawned++;
                }
            }
        }

        collectItem(item, type) {
            item.destroy();
            this.playerStats[type]++;
            this.updateUI();
        }

        collectHeart(player, heart) {
            if (this.playerStats.lives < 3) {
                heart.destroy();
                this.playerStats.lives++;
                this.updateUI();
            }
        }

        depositIntel() {
            if (this.playerStats.intel > 0) {
                this.playerStats.chestIntel += this.playerStats.intel;
                this.playerStats.intel = 0;
                this.updateUI();
            }
        }

        depositLoot() {
            if (this.playerStats.generalLoot > 0) {
                this.playerStats.chestLoot += this.playerStats.generalLoot;
                this.playerStats.generalLoot = 0;
                this.updateUI();
            }
        }

        exchangeSlugs() {
            if (this.playerStats.slugs > 0) {
                let amountToSpawn = this.playerStats.slugs * 3;
                this.spawnObjectsOnGrid(this.genLootGroup, amountToSpawn, [0xffa500, 0xffff00], 6);
                
                this.playerStats.npcSlugs += this.playerStats.slugs;
                this.playerStats.slugs = 0;
                this.updateUI();
            }
        }

        hitPlayer(player, zombie) {
            if (this.isInvulnerable) return;

            this.playerStats.lives--;
            this.updateUI();

            if (this.playerStats.lives <= 0) {
                alert("Агент погиб! Возвращение на базу...");
                this.playerStats.lives = 3;
                this.playerStats.slugs = 0;
                this.playerStats.intel = 0;
                this.playerStats.generalLoot = 0;
                
                this.player.x = 30 * 32;
                this.player.y = 30 * 32;
                this.updateUI();
            } else {
                this.isInvulnerable = true;
                this.tweens.add({
                    targets: this.player,
                    alpha: 0.2,
                    duration: 100,
                    yoyo: true,
                    repeat: 5,
                    onComplete: () => {
                        this.player.alpha = 1;
                        this.isInvulnerable = false;
                    }
                });
            }
        }

        // Новая функция обновления HTML интерфейса вместо текста на холсте
        updateUI() {
            document.getElementById('ui-lives').innerText = this.playerStats.lives;
            document.getElementById('ui-slugs').innerText = this.playerStats.slugs;
            document.getElementById('ui-intel').innerText = this.playerStats.intel;
            document.getElementById('ui-loot').innerText = this.playerStats.generalLoot;
            document.getElementById('ui-chest-intel').innerText = this.playerStats.chestIntel;
            document.getElementById('ui-chest-loot').innerText = this.playerStats.chestLoot;
            document.getElementById('ui-npc-slugs').innerText = this.playerStats.npcSlugs;
        }

        update() {
            const playerSpeed = 220;
            this.player.body.setVelocity(0);

            if (this.cursors.left.isDown || this.wasd.A.isDown) this.player.body.setVelocityX(-playerSpeed);
            else if (this.cursors.right.isDown || this.wasd.D.isDown) this.player.body.setVelocityX(playerSpeed);

            if (this.cursors.up.isDown || this.wasd.W.isDown) this.player.body.setVelocityY(-playerSpeed);
            else if (this.cursors.down.isDown || this.wasd.S.isDown) this.player.body.setVelocityY(playerSpeed);

            const zombieSpeed = 40; 
            this.zombiesGroup.children.iterate(zombie => {
                if (Math.abs(zombie.body.velocity.x) < 5 && Math.abs(zombie.body.velocity.y) < 5) {
                    let angle = Phaser.Math.Between(0, 360);
                    this.physics.velocityFromAngle(angle, zombieSpeed, zombie.body.velocity);
                } else if (Phaser.Math.Between(0, 100) === 0) {
                    let angle = Phaser.Math.Between(0, 360);
                    this.physics.velocityFromAngle(angle, zombieSpeed, zombie.body.velocity);
                }
            });
        }
    }

    const config = {
        type: Phaser.AUTO,
        width: 800,
        height: 600,
        parent: 'game-container',
        physics: {
            default: 'arcade',
            arcade: { debug: false }
        },
        scene: [GameScene]
    };

    const game = new Phaser.Game(config);
</script>

</body>
</html>
