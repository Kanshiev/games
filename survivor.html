<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Survivor.io - Alpha 4.3.1 (Hotfix)</title>
    <style>
        body {
            margin: 0; padding: 0;
            background-color: #111; color: #fff;
            font-family: 'Courier New', Courier, monospace;
            display: flex; align-items: center; justify-content: center;
            min-height: 100vh; overflow: hidden; user-select: none;
        }
        #gameWrapper {
            display: flex;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
            border: 4px solid #333; border-radius: 8px;
            background-color: #222;
        }
        #uiPanel {
            width: 250px; padding: 20px; background-color: #1a1a1a;
            border-right: 4px solid #333; display: flex; flex-direction: column;
        }
        #uiPanel h2 { margin-top: 0; color: #e74c3c; text-align: center; }
        .stat-box { background: #333; padding: 10px; border-radius: 5px; margin-bottom: 10px; }
        .stat-label { font-size: 0.9rem; color: #aaa; margin-bottom: 5px; }
        .stat-value { font-size: 1.2rem; font-weight: bold; }
        .stat-subtext { font-size: 0.8rem; color: #e74c3c; font-weight: normal; margin-left: 5px; }
        
        #gameContainer { position: relative; background-color: #2e5c1e; }
        canvas { display: block; }
        
        .overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.85); display: none; flex-direction: column;
            align-items: center; justify-content: center; text-align: center; z-index: 10;
        }
        .overlay.active { display: flex; }
        .overlay h1 { font-size: 3rem; margin-bottom: 20px; text-transform: uppercase; letter-spacing: 3px; }
        .btn {
            padding: 10px 20px; font-size: 1rem; font-weight: bold;
            text-transform: uppercase; background-color: #e74c3c;
            color: white; border: none; border-radius: 4px;
            cursor: pointer; transition: 0.2s; margin-top: 10px; width: 100%;
        }
        .btn:hover { background-color: #c0392b; transform: scale(1.05); }
        
        .bar-bg { width: 100%; height: 15px; background: #555; border-radius: 3px; overflow: hidden; margin-top: 5px;}
        .hp-bar { height: 100%; background: #2ecc71; width: 100%; transition: width 0.2s; }
        .armor-bar { height: 100%; background: #3498db; width: 0%; transition: width 0.2s; }
    </style>
</head>
<body>

<div id="gameWrapper">
    <div id="uiPanel">
        <h2>СТАТУС</h2>
        
        <div class="stat-box">
            <div class="stat-label">УРОВЕНЬ</div>
            <div class="stat-value" id="uiLevel">1</div>
        </div>
        <div class="stat-box">
            <div class="stat-label">ВОЛНА</div>
            <div class="stat-value">
                <span id="uiWave">1 / 5</span> 
                <span class="stat-subtext" id="uiWaveLeft"></span>
            </div>
        </div>
        <div class="stat-box">
            <div class="stat-label">УБИТО ВРАГОВ</div>
            <div class="stat-value" id="uiKills" style="color: #2ecc71;">0</div>
        </div>
        <div class="stat-box">
            <div class="stat-label">ОРУЖИЕ</div>
            <div class="stat-value" id="uiWeapon" style="color: #f1c40f;">Пистолет</div>
        </div>
        <div class="stat-box">
            <div class="stat-label">ГРАНАТЫ (R)</div>
            <div class="stat-value" id="uiGrenades" style="color: #e67e22;">0</div>
        </div>
        <div class="stat-box">
            <div class="stat-label">ЗДОРОВЬЕ: <span id="uiHpText">100</span></div>
            <div class="bar-bg"><div id="uiHpBar" class="hp-bar"></div></div>
        </div>
        <div class="stat-box">
            <div class="stat-label">БРОНЯ: <span id="uiArmorText">0</span></div>
            <div class="bar-bg"><div id="uiArmorBar" class="armor-bar"></div></div>
        </div>
        
        <div style="flex-grow: 1;"></div>
        <div style="color: #888; font-size: 0.75rem; margin-bottom: 10px;">Движение: WASD<br>Гранаты: R<br>Пауза: P</div>
        <button id="btnPause" class="btn" style="background-color: #f39c12;">Пауза (P)</button>
        <button id="btnSave" class="btn" style="background-color: #2980b9;">Сохранить игру</button>
        <button id="btnLoad" class="btn" style="background-color: #27ae60;">Загрузить игру</button>
    </div>

    <div id="gameContainer">
        <canvas id="gameCanvas" width="800" height="600"></canvas>
        <div id="screenOverlay" class="overlay active">
            <h1 id="overlayTitle">Wasteland Survivor</h1>
            <p id="overlayDesc" style="color: #ccc;">Сдержи натиск. Одолей боссов.</p>
            <button id="actionBtn" class="btn" style="width: auto; padding: 15px 40px; font-size: 1.2rem;">Начать игру</button>
        </div>
    </div>
</div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

const overlay = document.getElementById('screenOverlay');
const overlayTitle = document.getElementById('overlayTitle');
const overlayDesc = document.getElementById('overlayDesc');
const actionBtn = document.getElementById('actionBtn');

const uiLevel = document.getElementById('uiLevel');
const uiWave = document.getElementById('uiWave');
const uiWaveLeft = document.getElementById('uiWaveLeft');
const uiKills = document.getElementById('uiKills');
const uiWeapon = document.getElementById('uiWeapon');
const uiGrenades = document.getElementById('uiGrenades');
const uiHpText = document.getElementById('uiHpText');
const uiHpBar = document.getElementById('uiHpBar');
const uiArmorText = document.getElementById('uiArmorText');
const uiArmorBar = document.getElementById('uiArmorBar');

const WORLD_WIDTH = 3000;
const WORLD_HEIGHT = 3000;

// ТУТ МЕНЯЕТСЯ ЛИМИТ СПАВНА МОБОВ!
const MAX_ACTIVE_ZOMBIES = 300; 

let player = { 
    x: WORLD_WIDTH / 2, y: WORLD_HEIGHT / 2, radius: 16, hp: 100, maxHp: 100, 
    armor: 0, maxArmor: 100, weapon: 'pistol', grenades: 0, speed: 4, shootCooldown: 0, 
    hasSaws: false, sawAngle: 0, sawCount: 3, sawRadius: 60
};
let bullets = []; let zombies = []; let enemyProjectiles = []; let items = []; 
let thrownGrenades = []; let explosions = []; 
let keys = {};
let currentLevel = 1; let waveIndex = 0; let totalKills = 0;
let zombiesRemainingToSpawn = 0; 
let isGameRunning = false; let isPaused = false;

const waveBaseCounts = [15, 25, 40, 70, 120];

window.addEventListener('keydown', e => {
    keys[e.code] = true;
    if (e.code === 'KeyP') togglePause();
    if (e.code === 'KeyR' && !keys['r_locked']) {
        keys['r_locked'] = true;
        if (player.grenades > 0) throwPlayerGrenade();
    }
});
window.addEventListener('keyup', e => {
    keys[e.code] = false;
    if (e.code === 'KeyR') keys['r_locked'] = false;
});

actionBtn.addEventListener('click', () => initGame());
document.getElementById('btnSave').addEventListener('click', saveGame);
document.getElementById('btnLoad').addEventListener('click', loadGame);
document.getElementById('btnPause').addEventListener('click', togglePause);

function togglePause() {
    if (!isGameRunning || player.hp <= 0) return;
    isPaused = !isPaused;
    document.getElementById('btnPause').innerText = isPaused ? "Продолжить (P)" : "Пауза (P)";
}

function saveGame() {
    if(!isGameRunning || player.hp <= 0) return alert("Невозможно сохранить сейчас.");
    const saveData = {
        player: { ...player, shootCooldown: 0 },
        currentLevel, waveIndex, totalKills
    };
    localStorage.setItem('survivorSave', JSON.stringify(saveData));
    alert("Игра сохранена!");
}

function loadGame() {
    const data = localStorage.getItem('survivorSave');
    if (!data) return alert("Нет сохранений.");
    const parsed = JSON.parse(data);
    
    player = parsed.player;
    if (player.grenades === undefined) player.grenades = 0; 
    if (player.sawCount === undefined) player.sawCount = 3;
    if (player.sawRadius === undefined) player.sawRadius = 60;
    
    currentLevel = parsed.currentLevel;
    waveIndex = parsed.waveIndex;
    totalKills = parsed.totalKills || 0;
    
    bullets = []; zombies = []; enemyProjectiles = []; items = []; thrownGrenades = []; explosions = [];
    isGameRunning = true; isPaused = false;
    document.getElementById('btnPause').innerText = "Пауза (P)";
    overlay.classList.remove('active');
    
    spawnWave();
}

function initGame() {
    player = {
        x: WORLD_WIDTH/2, y: WORLD_HEIGHT/2, radius: 16, speed: 4,
        hp: 100, maxHp: 100, armor: 0, maxArmor: 100, grenades: 0,
        shootCooldown: 0, weapon: 'pistol', hasSaws: false, sawAngle: 0,
        sawCount: 3, sawRadius: 60
    };
    bullets = []; zombies = []; enemyProjectiles = []; items = []; thrownGrenades = []; explosions = [];
    keys = {}; currentLevel = 1; waveIndex = 0; zombiesRemainingToSpawn = 0; totalKills = 0;
    isGameRunning = true; isPaused = false;
    document.getElementById('btnPause').innerText = "Пауза (P)";
    overlay.classList.remove('active');
    spawnWave();
}

function getWeaponStats() {
    if (player.weapon === 'pistol') return { speed: 40, damage: 1, name: 'Пистолет', pierce: false };
    if (player.weapon === 'machine_gun') return { speed: 10, damage: 2, name: 'Пулемет', pierce: false };
    if (player.weapon === 'minigun') return { speed: 4, damage: 1.5, name: 'Миниган', pierce: false };
    if (player.weapon === 'plasma_cutter') return { speed: 8, damage: 3, name: 'Плазменный резак', pierce: true };
}

function throwPlayerGrenade() {
    if (!isGameRunning || isPaused || player.grenades <= 0) return;
    
    let target = zombies.find(z => z.type === 'boss');
    if (!target) {
        let minDist = Infinity;
        for (let z of zombies) {
            let dist = Math.hypot(z.x - player.x, z.y - player.y);
            if (dist < minDist) { minDist = dist; target = z; }
        }
    }
    if (!target) return; 
    
    player.grenades--;
    thrownGrenades.push({
        x: player.x, y: player.y,
        startX: player.x, startY: player.y,
        targetX: target.x, targetY: target.y,
        timer: 20 
    });
}

function spawnWave() {
    zombies = [];
    if (waveIndex < waveBaseCounts.length) {
        let multiplier = Math.pow(1.25, currentLevel - 1);
        let totalWaveCount = Math.floor(waveBaseCounts[waveIndex] * multiplier);
        
        zombiesRemainingToSpawn = totalWaveCount;
        
        let startCount = Math.min(totalWaveCount, MAX_ACTIVE_ZOMBIES);
        for (let i = 0; i < startCount; i++) {
            spawnEnemy('normal');
            zombiesRemainingToSpawn--;
        }
    } else {
        zombiesRemainingToSpawn = 0;
        spawnEnemy('boss');
    }
}

function spawnEnemy(type) {
    const angle = Math.random() * Math.PI * 2;
    const distance = 500 + Math.random() * 300;
    let zx = Math.max(50, Math.min(WORLD_WIDTH - 50, player.x + Math.cos(angle) * distance));
    let zy = Math.max(50, Math.min(WORLD_HEIGHT - 50, player.y + Math.sin(angle) * distance));

    if (type === 'normal') {
        zombies.push({
            type: 'normal', x: zx, y: zy, radius: 14,
            speed: 0.5 + Math.random() * 0.2, 
            hp: 3 * (1 + (currentLevel-1)*0.2), 
            maxHp: 3 * (1 + (currentLevel-1)*0.2)
        });
    } else if (type === 'boss') {
        let boss = { type: 'boss', x: zx, y: zy, timer: 0 };
        const bossConfigs = {
            1: {name: "ТОЛСТЯК", hp: 80, rad: 35, speed: 0.6},
            2: {name: "ПЛЕВАЛЬЩИК", hp: 250, rad: 35, speed: 0.7, bType: 'spitter'},
            3: {name: "БАРМАГЛОТ", hp: 800, rad: 45, speed: 0.8, bType: 'barmaglot'},
            4: {name: "ТОКСИЧНЫЙ ТИМЛИД", hp: 1200, rad: 40, speed: 0.9},
            5: {name: "КОУЧ УСПЕШНОГО УСПЕХА", hp: 1700, rad: 42, speed: 1.0},
            6: {name: "ДЕД ИНСАЙД", hp: 2300, rad: 35, speed: 1.2},
            7: {name: "КРОВАКРЫЛ", hp: 3500, rad: 30, speed: 1.8, bType: 'bloodwing'},
            8: {name: "БАТЯ С РЕМНЕМ", hp: 5000, rad: 40, speed: 1.3},
            9: {name: "САНТЕХНИК МИХАЛЫЧ", hp: 7000, rad: 45, speed: 0.8},
            10: {name: "МЕХА-СТРАЖ", hp: 10000, rad: 50, speed: 0.9, bType: 'mecha'},
            11: {name: "БИЗНЕС-АНГЕЛ НА МЕРСЕ", hp: 13000, rad: 45, speed: 1.2},
            12: {name: "ДУШНЫЙ КОЛЛЕГА", hp: 17000, rad: 40, speed: 0.9},
            13: {name: "КАРЕН ИЗ БУХГАЛТЕРИИ", hp: 22000, rad: 42, speed: 1.0},
            14: {name: "ИНФОЦЫГАН НА САМОКАТЕ", hp: 28000, rad: 38, speed: 1.5},
            15: {name: "ГЕНДИРЕКТОР ОАО 'МРАК'", hp: 35000, rad: 52, speed: 1.0}
        };

        let conf = bossConfigs[currentLevel] || {name: `СВЕРХМУТАНТ УР. ${currentLevel}`, hp: 35000 + (currentLevel - 15) * 5000, rad: 45, speed: 1.0};
        
        boss.name = conf.name; boss.radius = conf.rad; boss.speed = conf.speed; 
        boss.hp = conf.hp; boss.maxHp = conf.hp; boss.bossType = conf.bType || 'generic';
        
        zombies.push(boss);
    }
}

let lastFrameTime = performance.now();
const FPS_LIMIT = 60;
const FRAME_DELAY = 1000 / FPS_LIMIT;

function gameLoop(currentTime) {
    requestAnimationFrame(gameLoop);
    
    if (!currentTime) currentTime = performance.now();
    const delta = currentTime - lastFrameTime;
    
    if (delta >= FRAME_DELAY) {
        lastFrameTime = currentTime - (delta % FRAME_DELAY); 
        
        if (isGameRunning && !isPaused) {
            update(); 
        }
        draw(); 
        updateUI();
    }
}

function update() {
    let dx = 0, dy = 0;
    if (keys['KeyW'] || keys['ArrowUp']) dy -= 1;
    if (keys['KeyS'] || keys['ArrowDown']) dy += 1;
    if (keys['KeyA'] || keys['ArrowLeft']) dx -= 1;
    if (keys['KeyD'] || keys['ArrowRight']) dx += 1;

    if (dx !== 0 && dy !== 0) { dx *= 0.7071; dy *= 0.7071; }
    player.x = Math.max(player.radius, Math.min(WORLD_WIDTH - player.radius, player.x + dx * player.speed));
    player.y = Math.max(player.radius, Math.min(WORLD_HEIGHT - player.radius, player.y + dy * player.speed));

    if (zombiesRemainingToSpawn > 0 && zombies.length < MAX_ACTIVE_ZOMBIES) {
        let spawnCount = Math.min(MAX_ACTIVE_ZOMBIES - zombies.length, zombiesRemainingToSpawn);
        for (let i = 0; i < spawnCount; i++) {
            spawnEnemy('normal');
            zombiesRemainingToSpawn--;
        }
    }

    if (player.hasSaws) {
        player.sawAngle += 0.05;
        const orbitRadius = player.sawRadius || 60;
        for (let z of zombies) {
            if (Math.hypot(player.x - z.x, player.y - z.y) <= (orbitRadius + 20)) {
                z.hp -= 0.5; 
                if (z.hp <= 0 && !z.deadMark) z.deadMark = true; 
            }
        }
    }

    let nearestZombie = null, minDist = Infinity;
    for (let z of zombies) {
        let dist = Math.hypot(z.x - player.x, z.y - player.y);
        if (dist < minDist) { minDist = dist; nearestZombie = z; }
    }

    if (player.shootCooldown > 0) player.shootCooldown--;
    if (player.shootCooldown === 0 && nearestZombie) {
        let stats = getWeaponStats();
        const angle = Math.atan2(nearestZombie.y - player.y, nearestZombie.x - player.x);
        bullets.push({ 
            x: player.x, y: player.y, 
            vx: Math.cos(angle) * 12, vy: Math.sin(angle) * 12, 
            radius: player.weapon === 'plasma_cutter' ? 8 : 4, 
            dmg: stats.damage, 
            pierce: stats.pierce,
            hitEnemies: [] 
        });
        player.shootCooldown = stats.speed;
    }

    for (let i = bullets.length - 1; i >= 0; i--) {
        let b = bullets[i];
        b.x += b.vx; b.y += b.vy;
        if (b.x < 0 || b.x > WORLD_WIDTH || b.y < 0 || b.y > WORLD_HEIGHT) { bullets.splice(i, 1); continue; }

        let hit = false;
        for (let j = zombies.length - 1; j >= 0; j--) {
            let z = zombies[j];
            if (b.pierce && b.hitEnemies.includes(z)) continue;

            if (Math.hypot(b.x - z.x, b.y - z.y) < b.radius + z.radius) {
                z.hp -= b.dmg; 
                if (z.hp <= 0) z.deadMark = true;
                
                if (b.pierce) {
                    b.hitEnemies.push(z);
                } else {
                    hit = true;
                    break;
                }
            }
        }
        if (hit) bullets.splice(i, 1);
    }

    for (let i = thrownGrenades.length - 1; i >= 0; i--) {
        let g = thrownGrenades[i];
        g.timer--;
        if (g.timer > 0) {
            g.x += (g.targetX - g.startX) / 20;
            g.y += (g.targetY - g.startY) / 20;
        } else {
            for (let z of zombies) {
                if (Math.hypot(z.x - g.x, z.y - g.y) <= 100) {
                    if (z.type === 'boss') z.hp -= (z.maxHp * 0.10); 
                    else z.hp -= 200; 
                    if (z.hp <= 0 && !z.deadMark) z.deadMark = true;
                }
            }
            explosions.push({x: g.x, y: g.y, radius: 100, life: 10});
            thrownGrenades.splice(i, 1);
        }
    }

    for (let i = explosions.length - 1; i >= 0; i--) {
        explosions[i].life--;
        if (explosions[i].life <= 0) explosions.splice(i, 1);
    }

    for (let i = 0; i < zombies.length; i++) {
        for (let j = i + 1; j < zombies.length; j++) {
            let z1 = zombies[i], z2 = zombies[j];
            let distSq = (z1.x - z2.x)**2 + (z1.y - z2.y)**2;
            let minDist = z1.radius + z2.radius;
            if (distSq < minDist**2 && distSq > 0) {
                let dist = Math.sqrt(distSq); let overlap = minDist - dist;
                let nx = (z2.x - z1.x) / dist, ny = (z2.y - z1.y) / dist;
                z1.x -= nx * overlap * 0.5; z1.y -= ny * overlap * 0.5;
                z2.x += nx * overlap * 0.5; z2.y += ny * overlap * 0.5;
            }
        }
    }

    for (let i = enemyProjectiles.length - 1; i >= 0; i--) {
        let ep = enemyProjectiles[i];
        if (ep.type === 'poison') {
            ep.x += ep.vx; ep.y += ep.vy;
            if (Math.hypot(ep.x - player.x, ep.y - player.y) < ep.radius + player.radius) {
                takeDamage(10); enemyProjectiles.splice(i, 1); continue;
            }
            if (ep.x < 0 || ep.x > WORLD_WIDTH || ep.y < 0 || ep.y > WORLD_HEIGHT) enemyProjectiles.splice(i, 1);
        } else if (ep.type === 'grenade') {
            ep.timer--;
            if (ep.timer > 30) {
                ep.x += (ep.targetX - ep.startX) / 60; ep.y += (ep.targetY - ep.startY) / 60;
            }
            if (ep.timer <= 0) {
                if (Math.hypot(ep.x - player.x, ep.y - player.y) < ep.blastRadius) takeDamage(25);
                enemyProjectiles.splice(i, 1);
            }
        }
    }

    for (let i = zombies.length - 1; i >= 0; i--) {
        let z = zombies[i];
        if (z.deadMark) {
            killZombie(z);
            zombies.splice(i, 1);
            continue;
        }

        let angle = Math.atan2(player.y - z.y, player.x - z.x);
        z.x += Math.cos(angle) * z.speed;
        z.y += Math.sin(angle) * z.speed;

        if (z.type === 'boss') {
            z.timer++;
            if (z.bossType === 'spitter' && z.timer >= 300) {
                z.timer = 0; let pAngle = Math.atan2(player.y - z.y, player.x - z.x);
                enemyProjectiles.push({ type: 'poison', x: z.x, y: z.y, vx: Math.cos(pAngle)*5, vy: Math.sin(pAngle)*5, radius: 8 });
            }
            if (z.bossType === 'barmaglot' && z.timer >= 240) {
                z.timer = 0;
                enemyProjectiles.push({
                    type: 'grenade', startX: z.x, startY: z.y, x: z.x, y: z.y,
                    targetX: player.x, targetY: player.y, timer: 90, blastRadius: 80
                });
            }
        }
        if (Math.hypot(player.x - z.x, player.y - z.y) < player.radius + z.radius) {
            takeDamage(z.type === 'boss' ? 0.5 : 0.1); 
        }
    }

    for (let i = items.length - 1; i >= 0; i--) {
        let item = items[i];
        if (Math.hypot(item.x - player.x, item.y - player.y) < player.radius + item.radius) {
            if (item.type === 'machine_gun') { player.weapon = 'machine_gun'; levelUp(); } 
            else if (item.type === 'armor_boss') { player.maxArmor = 100; player.armor = 100; levelUp(); } 
            else if (item.type === 'minigun') { player.weapon = 'minigun'; levelUp(); }
            else if (item.type === 'saws') { player.hasSaws = true; levelUp(); }
            else if (item.type === 'plasma_cutter') { player.weapon = 'plasma_cutter'; levelUp(); }
            else if (item.type === 'saw_upgrade') {
                player.sawCount = (player.sawCount || 3) + 1;
                player.sawRadius = (player.sawRadius || 60) + 10;
                levelUp();
            }
            else if (item.type === 'generic_boss_loot') { levelUp(); }
            else if (item.type === 'armor_shard') player.armor = Math.min(player.maxArmor, player.armor + (player.maxArmor * 0.1));
            else if (item.type === 'medkit') player.hp = Math.min(player.maxHp, player.hp + (player.maxHp * 0.05));
            else if (item.type === 'player_grenade_pickup') player.grenades++;
            
            items.splice(i, 1);
        }
    }

    const bossLootTypes = ['machine_gun', 'armor_boss', 'minigun', 'saws', 'plasma_cutter', 'saw_upgrade', 'generic_boss_loot'];
    if (zombies.length === 0 && zombiesRemainingToSpawn === 0 && !items.some(i => bossLootTypes.includes(i.type))) {
        if (waveIndex < waveBaseCounts.length) {
            waveIndex++; spawnWave();
        } else if (currentLevel === 3) {
            levelUp(); 
        }
    }
}

function takeDamage(amount) {
    if (player.armor > 0) {
        player.armor -= amount;
        if (player.armor < 0) { player.hp += player.armor; player.armor = 0; }
    } else { player.hp -= amount; }
    if (player.hp <= 0) endGame(false);
}

function killZombie(z) {
    totalKills++; 
    
    if (z.type === 'boss') {
        if (currentLevel === 1) items.push({ type: 'machine_gun', x: z.x, y: z.y, radius: 25 });
        else if (currentLevel === 2) items.push({ type: 'armor_boss', x: z.x, y: z.y, radius: 25 });
        else if (currentLevel === 7) items.push({ type: 'minigun', x: z.x, y: z.y, radius: 25 });
        else if (currentLevel === 10) items.push({ type: 'saws', x: z.x, y: z.y, radius: 25 });
        else if (currentLevel === 13) items.push({ type: 'plasma_cutter', x: z.x, y: z.y, radius: 25 });
        else if (currentLevel > 10) items.push({ type: 'saw_upgrade', x: z.x, y: z.y, radius: 25 });
        else if (currentLevel !== 3) items.push({ type: 'generic_boss_loot', x: z.x, y: z.y, radius: 25 });
    } else {
        if (Math.random() < 0.02) items.push({ type: 'player_grenade_pickup', x: z.x, y: z.y, radius: 10 }); 
        if (currentLevel >= 3 && Math.random() < 0.1) items.push({ type: 'armor_shard', x: z.x, y: z.y, radius: 10 });
        if (currentLevel >= 4 && Math.random() < 0.05) items.push({ type: 'medkit', x: z.x, y: z.y, radius: 10 });
    }
}

function levelUp() {
    currentLevel++; waveIndex = 0; spawnWave();
}

function updateUI() {
    if(!isGameRunning) return;
    uiLevel.innerText = currentLevel;
    uiKills.innerText = totalKills;
    
    if (waveIndex < waveBaseCounts.length) {
        uiWave.innerText = `${waveIndex + 1} / 5`;
        let totalRemaining = zombies.length + zombiesRemainingToSpawn;
        uiWaveLeft.innerText = `(Осталось: ${totalRemaining})`;
    } else {
        uiWave.innerText = 'БОСС';
        uiWaveLeft.innerText = '';
    }
    
    uiWeapon.innerText = getWeaponStats().name;
    uiGrenades.innerText = player.grenades;
    
    let hpPerc = Math.max(0, (player.hp / player.maxHp) * 100);
    uiHpText.innerText = Math.round(player.hp);
    uiHpBar.style.width = hpPerc + '%';
    
    let armPerc = Math.max(0, (player.armor / player.maxArmor) * 100);
    uiArmorText.innerText = Math.round(player.armor);
    uiArmorBar.style.width = armPerc + '%';
}

function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    let cameraX = Math.max(0, Math.min(player.x - canvas.width / 2, WORLD_WIDTH - canvas.width));
    let cameraY = Math.max(0, Math.min(player.y - canvas.height / 2, WORLD_HEIGHT - canvas.height));

    ctx.fillStyle = '#2e5c1e'; ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.strokeStyle = '#254b17'; ctx.lineWidth = 1; const gridSize = 100;
    for (let x = Math.floor(cameraX/gridSize)*gridSize; x < cameraX+canvas.width; x+=gridSize) {
        ctx.beginPath(); ctx.moveTo(x-cameraX, 0); ctx.lineTo(x-cameraX, canvas.height); ctx.stroke();
    }
    for (let y = Math.floor(cameraY/gridSize)*gridSize; y < cameraY+canvas.height; y+=gridSize) {
        ctx.beginPath(); ctx.moveTo(0, y-cameraY); ctx.lineTo(canvas.width, y-cameraY); ctx.stroke();
    }
    ctx.strokeStyle = '#c0392b'; ctx.lineWidth = 8;
    ctx.strokeRect(-cameraX, -cameraY, WORLD_WIDTH, WORLD_HEIGHT);

    for (let item of items) {
        ctx.save(); ctx.translate(item.x - cameraX, item.y - cameraY);
        if (item.type === 'machine_gun') { ctx.fillStyle = '#f1c40f'; ctx.beginPath(); ctx.arc(0, 0, item.radius, 0, Math.PI*2); ctx.fill(); } 
        else if (item.type === 'armor_boss') { ctx.fillStyle = '#3498db'; ctx.beginPath(); ctx.arc(0, 0, item.radius, 0, Math.PI*2); ctx.fill(); } 
        else if (item.type === 'minigun') { ctx.fillStyle = '#e67e22'; ctx.beginPath(); ctx.arc(0, 0, item.radius, 0, Math.PI*2); ctx.fill(); }
        else if (item.type === 'saws') { ctx.fillStyle = '#9b59b6'; ctx.beginPath(); ctx.arc(0, 0, item.radius, 0, Math.PI*2); ctx.fill(); }
        else if (item.type === 'plasma_cutter') { ctx.fillStyle = '#00ffff'; ctx.beginPath(); ctx.arc(0, 0, item.radius, 0, Math.PI*2); ctx.fill(); }
        else if (item.type === 'saw_upgrade') { ctx.fillStyle = '#ff4757'; ctx.beginPath(); ctx.arc(0, 0, item.radius, 0, Math.PI*2); ctx.fill(); }
        else if (item.type === 'generic_boss_loot') { ctx.fillStyle = '#bdc3c7'; ctx.beginPath(); ctx.arc(0, 0, item.radius, 0, Math.PI*2); ctx.fill(); }
        else if (item.type === 'armor_shard') { ctx.fillStyle = '#85c1e9'; ctx.beginPath(); ctx.arc(0, 0, item.radius, 0, Math.PI*2); ctx.fill(); }
        else if (item.type === 'medkit') {
            ctx.fillStyle = '#fff'; ctx.fillRect(-8, -8, 16, 16);
            ctx.fillStyle = '#e74c3c'; ctx.fillRect(-2, -6, 4, 12); ctx.fillRect(-6, -2, 12, 4);
        }
        else if (item.type === 'player_grenade_pickup') {
            ctx.fillStyle = '#000'; ctx.beginPath(); ctx.arc(0, 0, item.radius, 0, Math.PI*2); ctx.fill();
            ctx.fillStyle = '#e67e22'; ctx.fillRect(-2, -8, 4, 4); 
        }
        ctx.restore();
        
        const bossLootTypes = ['machine_gun', 'armor_boss', 'minigun', 'saws', 'plasma_cutter', 'saw_upgrade', 'generic_boss_loot'];
        if (bossLootTypes.includes(item.type)) {
            ctx.fillStyle = '#fff'; ctx.font = '14px Arial'; ctx.textAlign = 'center';
            if (item.type === 'saw_upgrade') {
                ctx.fillText("+1 К СТРАЖУ!", item.x - cameraX, item.y - cameraY - 30);
            } else if (item.type === 'plasma_cutter') {
                ctx.fillText("РЕЗАК!", item.x - cameraX, item.y - cameraY - 30);
            } else {
                ctx.fillText("ЛУТ!", item.x - cameraX, item.y - cameraY - 30);
            }
        }
    }

    for(let ex of explosions) {
        ctx.fillStyle = `rgba(230, 126, 34, ${ex.life/10})`;
        ctx.beginPath(); ctx.arc(ex.x - cameraX, ex.y - cameraY, ex.radius, 0, Math.PI*2); ctx.fill();
    }

    for(let g of thrownGrenades) {
        ctx.fillStyle = '#000';
        ctx.beginPath(); ctx.arc(g.x - cameraX, g.y - cameraY, 6, 0, Math.PI*2); ctx.fill();
    }

    for (let ep of enemyProjectiles) {
        if (ep.type === 'poison') {
            ctx.fillStyle = '#2ecc71'; ctx.beginPath(); ctx.arc(ep.x - cameraX, ep.y - cameraY, ep.radius, 0, Math.PI*2); ctx.fill();
        } else if (ep.type === 'grenade') {
            ctx.fillStyle = (ep.timer % 10 < 5) ? 'rgba(231, 76, 60, 0.4)' : 'rgba(231, 76, 60, 0.1)';
            ctx.beginPath(); ctx.arc(ep.targetX - cameraX, ep.targetY - cameraY, ep.blastRadius, 0, Math.PI*2); ctx.fill();
            ctx.fillStyle = '#e67e22'; ctx.beginPath(); ctx.arc(ep.x - cameraX, ep.y - cameraY, 8, 0, Math.PI*2); ctx.fill();
        }
    }

    for (let b of bullets) {
        if (player.weapon === 'plasma_cutter') {
            ctx.fillStyle = '#00ffff'; 
            ctx.shadowColor = '#00ffff'; ctx.shadowBlur = 10;
            ctx.beginPath(); ctx.arc(b.x - cameraX, b.y - cameraY, b.radius, 0, Math.PI*2); ctx.fill();
            ctx.shadowBlur = 0; 
        } else {
            ctx.fillStyle = '#f1c40f';
            ctx.beginPath(); ctx.arc(b.x - cameraX, b.y - cameraY, b.radius, 0, Math.PI*2); ctx.fill();
        }
    }

    for (let z of zombies) {
        if (z.type === 'normal') ctx.fillStyle = '#27ae60';
        else if (z.bossType === 'fatty') ctx.fillStyle = '#8e44ad'; 
        else if (z.bossType === 'spitter') ctx.fillStyle = '#1abc9c'; 
        else if (z.bossType === 'barmaglot') ctx.fillStyle = '#c0392b'; 
        else if (z.bossType === 'bloodwing') ctx.fillStyle = '#8e0000';
        else if (z.bossType === 'mecha') ctx.fillStyle = '#34495e';
        else ctx.fillStyle = '#d35400'; 

        ctx.beginPath(); ctx.arc(z.x - cameraX, z.y - cameraY, z.radius, 0, Math.PI*2); ctx.fill();

        let zAngle = Math.atan2(player.y - z.y, player.x - z.x);
        ctx.save(); ctx.translate(z.x - cameraX, z.y - cameraY); ctx.rotate(zAngle);
        ctx.fillStyle = '#000'; 
        ctx.beginPath(); ctx.arc(z.radius/2, -z.radius/3, z.radius/6, 0, Math.PI*2);
        ctx.arc(z.radius/2, z.radius/3, z.radius/6, 0, Math.PI*2); ctx.fill();
        ctx.restore();

        if (z.type === 'boss') {
            ctx.fillStyle = '#fff'; ctx.font = 'bold 12px Arial'; ctx.textAlign = 'center';
            ctx.fillText(z.name, z.x - cameraX, z.y - cameraY - z.radius - 12);
            
            const bWidth = 60;
            ctx.fillStyle = '#7f8c8d'; ctx.fillRect(z.x - cameraX - bWidth/2, z.y - cameraY - z.radius - 8, bWidth, 5);
            ctx.fillStyle = '#e74c3c'; ctx.fillRect(z.x - cameraX - bWidth/2, z.y - cameraY - z.radius - 8, bWidth * (z.hp/z.maxHp), 5);
        } else if (z.hp < z.maxHp) {
            ctx.fillStyle = '#7f8c8d'; ctx.fillRect(z.x - cameraX - 15, z.y - cameraY - z.radius - 8, 30, 4);
            ctx.fillStyle = '#e74c3c'; ctx.fillRect(z.x - cameraX - 15, z.y - cameraY - z.radius - 8, 30 * (z.hp/z.maxHp), 4);
        }
    }

    ctx.save(); ctx.translate(player.x - cameraX, player.y - cameraY);
    ctx.fillStyle = '#3498db'; ctx.beginPath(); ctx.arc(0, 0, player.radius, 0, Math.PI*2); ctx.fill();
    let target = zombies.reduce((acc, curr) => Math.hypot(curr.x-player.x, curr.y-player.y) < Math.hypot(acc.x-player.x, acc.y-player.y) ? curr : acc, {x: Infinity, y: Infinity});
    if (zombies.length > 0) ctx.rotate(Math.atan2(target.y - player.y, target.x - player.x));
    
    ctx.fillStyle = '#34495e'; 
    if (player.weapon === 'pistol') ctx.fillRect(8, -3, 14, 6);
    else if (player.weapon === 'machine_gun') ctx.fillRect(8, -4, 22, 8);
    else if (player.weapon === 'minigun') {
        ctx.fillRect(8, -5, 26, 10); ctx.fillStyle = '#e67e22'; ctx.fillRect(20, -6, 16, 12); 
    } else if (player.weapon === 'plasma_cutter') {
        ctx.fillStyle = '#8e44ad'; ctx.fillRect(8, -4, 28, 8); 
        ctx.fillStyle = '#00ffff'; ctx.fillRect(14, -2, 22, 4); 
    }
    ctx.restore();

    if (player.hasSaws) {
        const sawCount = player.sawCount || 3; 
        const orbitRadius = player.sawRadius || 60;
        for(let i=0; i<sawCount; i++) {
            let sAngle = player.sawAngle + (i * Math.PI * 2 / sawCount);
            let sx = player.x - cameraX + Math.cos(sAngle) * orbitRadius;
            let sy = player.y - cameraY + Math.sin(sAngle) * orbitRadius;
            
            ctx.save(); ctx.translate(sx, sy); ctx.rotate(player.sawAngle * 5); 
            ctx.fillStyle = '#bdc3c7'; ctx.beginPath(); ctx.arc(0, 0, 10, 0, Math.PI*2); ctx.fill();
            ctx.fillStyle = '#7f8c8d';
            for(let j=0; j<4; j++) { ctx.rotate(Math.PI/2); ctx.beginPath(); ctx.moveTo(0,-5); ctx.lineTo(12,0); ctx.lineTo(0,5); ctx.fill(); }
            ctx.restore();
        }
    }
    
    const bossLootTypes = ['machine_gun', 'armor_boss', 'minigun', 'saws', 'plasma_cutter', 'saw_upgrade', 'generic_boss_loot'];
    if (items.some(i => bossLootTypes.includes(i.type))) {
        ctx.fillStyle = '#f1c40f'; ctx.font = 'bold 24px Arial'; ctx.textAlign = 'center';
        ctx.fillText("ПОДБЕРИТЕ УЛУЧШЕНИЕ ДЛЯ СЛЕДУЮЩЕГО УРОВНЯ!", canvas.width/2, 50);
    }
    
    if (isPaused) {
        ctx.fillStyle = 'rgba(0,0,0,0.6)'; ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = '#fff'; ctx.font = 'bold 40px "Courier New"'; ctx.textAlign = 'center';
        ctx.fillText("ПАУЗА", canvas.width/2, canvas.height/2);
    }
}

function endGame(isVictory) {
    isGameRunning = false;
    overlay.classList.add('active');
    overlayTitle.textContent = "СМЕРТЬ"; overlayTitle.style.color = "#e74c3c";
    overlayDesc.textContent = `Тебя порвали на куски на ${currentLevel} уровне.`;
    actionBtn.textContent = "Начать заново";
}

// ЗАПУСК ЦИКЛА ВЕРНУЛСЯ!
requestAnimationFrame(gameLoop);
</script>
